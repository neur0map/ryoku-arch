[opener]
edit = [
  { run = 'ryoku-launch-editor --in-place %s', block = true, desc = 'Edit with Ryoku editor', for = 'unix' },
]

[open]
prepend_rules = [
  { mime = 'text/*', use = 'edit' },
  { mime = 'application/json', use = 'edit' },
  { mime = 'application/xml', use = 'edit' },
  { url = '*.toml', use = 'edit' },
  { url = '*.json', use = 'edit' },
  { url = '*.kdl', use = 'edit' },
  { url = '*.yml', use = 'edit' },
  { url = '*.yaml', use = 'edit' },
  { url = '*.conf', use = 'edit' },
]
