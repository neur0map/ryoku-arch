source = ~/.config/hypr/colors.conf

monitor = , preferred, auto, auto

$terminal = kitty
$fileManager = dolphin
$menu = qs ipc call launcherWindow toggle

exec-once = ryoku-rebirth-shell
exec-once = hypridle -c ~/.config/hypr/hypridle-rebirth.conf
exec-once = nm-applet
exec-once = kdeconnectd
exec-once = kdeconnect-indicator
exec-once = wl-paste --watch cliphist store

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = MOZ_ENABLE_WAYLAND,1
env = GDK_SCALE,1
env = GDK_DPI_SCALE,1

general {
  gaps_in = 5
  gaps_out = 16
  border_size = 2
  col.active_border = $primary $tertiary 45deg
  col.inactive_border = $surface_container $outline 45deg
  resize_on_border = true
  layout = dwindle
}

decoration {
  rounding = 12
  active_opacity = 0.98
  inactive_opacity = 0.92

  shadow {
    enabled = true
    range = 12
    render_power = 4
    color = $shadow
  }

  blur {
    enabled = true
    size = 8
    passes = 3
    new_optimizations = true
  }
}

animations {
  enabled = true
  bezier = easeOut,0.23,1,0.32,1
  animation = windows, 1, 4, easeOut
  animation = fade, 1, 3, easeOut
  animation = workspaces, 1, 4, easeOut
}

input {
  kb_layout = us
  follow_mouse = 1
  sensitivity = 0

  touchpad {
    natural_scroll = false
  }
}

misc {
  disable_hyprland_logo = true
  force_default_wallpaper = 0
}

bind = SUPER, Return, exec, $terminal
bind = SUPER, E, exec, $fileManager
bind = SUPER, R, exec, qs ipc call launcherWindow toggle
bind = SUPER SHIFT, R, exec, ryoku-rebirth-shell restart
bind = SUPER, L, exec, loginctl lock-session
bind = SUPER, P, exec, ryoku-shell session open
bind = SUPER SHIFT, Q, killactive,
bind = SUPER SHIFT, E, exit,
bind = SUPER, F, fullscreen,
bind = SUPER, Space, togglefloating,

bind = , Print, exec, grim "$HOME/Pictures/Screenshots/screenshot-$(date +%Y%m%d-%H%M%S).png"
bind = SHIFT, Print, exec, grim -g "$(slurp)" "$HOME/Pictures/Screenshots/screenshot-$(date +%Y%m%d-%H%M%S).png"

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, float true
windowrule = match:title ^(Picture-in-Picture)$, float true
