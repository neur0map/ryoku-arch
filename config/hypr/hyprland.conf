source = ~/.config/hypr/colors.conf
# Monitor layout is managed by Ryoku Display settings (Settings > Display).
source = ~/.config/hypr/monitors.conf
# Keyboard layout lives in a user-owned file so updates don't reset it.
source = ~/.config/hypr/keyboard.conf

$terminal = kitty
$fileManager = nautilus
$yaziFileManager = sh -lc '$HOME/.local/share/ryoku/bin/ryoku-launch-tui yazi'
$neovimEditor = sh -lc '$HOME/.local/share/ryoku/bin/ryoku-launch-tui nvim'
$obsidianNotes = obsidian
$menu = sh -lc '$HOME/.local/share/ryoku/bin/ryoku-launch-app'
$clipboard = sh -lc '$HOME/.local/bin/ryoku-shell ipc clipboard open'
$gameBar = sh -lc '$HOME/.local/bin/ryoku-shell ipc gaming toggle'
$systemPanel = sh -lc '$HOME/.local/bin/ryoku-shell settings'
$hyprlandSettings = ryoku-launch-hyprmod
$powerMenu = sh -lc '$HOME/.local/bin/ryoku-shell session'
$lockscreen = sh -lc 'exec env -u QS_CONFIG_NAME -u QS_CONFIG_PATH -u QS_MANIFEST "$HOME/.local/share/quickshell-lockscreen/lock.sh"'
$heliumBrowser = sh -lc '$HOME/.local/bin/helium'
$screenshot = sh -lc 'exec "$HOME/.local/share/ryoku/bin/ryoku-cmd-screenshot" screen'
$regionScreenshot = sh -lc 'exec "$HOME/.local/share/ryoku/bin/ryoku-cmd-screenshot" region'
$screenshotChooser = sh -lc 'exec "$HOME/.local/share/ryoku/bin/ryoku-cmd-screenshot" choose'
$toggleFloat = sh -lc 'exec "$HOME/.local/share/ryoku/bin/ryoku-toggle-floating-center"'
$workspaceScrollNext = sh -lc 'exec "$HOME/.local/share/ryoku/bin/ryoku-cmd-hypr-workspace-scroll" next'
$workspaceScrollPrev = sh -lc 'exec "$HOME/.local/share/ryoku/bin/ryoku-cmd-hypr-workspace-scroll" prev'
$wallpaperSwitcher = sh -lc 'exec "$HOME/.local/share/ryoku/bin/ryoku-cmd-wallpaper-switcher"'

exec-once = sh -lc 'systemctl --user reset-failed ryoku-shell.service >/dev/null 2>&1 || true; exec systemctl --user start ryoku-shell.service'
# App launcher backend. ryoku-launch-app reads Settings > Launcher (default
# Vicinae) and, in apply mode, starts the Vicinae server when selected or stops
# it otherwise. The $menu keybind dispatches to the chosen launcher's window.
exec-once = sh -lc '$HOME/.local/share/ryoku/bin/ryoku-launch-app apply'
exec-once = nm-applet
exec-once = kdeconnectd
exec-once = kdeconnect-indicator
# RYOKU: clipboard history now captured by the image-capable ambxst ClipboardService
# (started by the shell); Super+V opens it. cliphist auto-start disabled.
# exec-once = wl-paste --watch cliphist store

env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = MOZ_ENABLE_WAYLAND,1
env = GDK_SCALE,1
env = GDK_DPI_SCALE,1

general {
  gaps_in = 5
  gaps_out = 16
  border_size = 2
  col.active_border = $primary $tertiary 45deg
  col.inactive_border = $surface_container $outline 45deg
  resize_on_border = true
  layout = dwindle
}

decoration {
  rounding = 12
  active_opacity = 0.98
  inactive_opacity = 0.92

  shadow {
    enabled = true
    range = 12
    render_power = 4
    color = $shadow
  }

  blur {
    enabled = true
    size = 8
    passes = 3
    new_optimizations = true
  }
}

animations {
  enabled = true
  bezier = easeOut,0.23,1,0.32,1
  bezier = smoothOpen,0.12,0,0.20,1
  animation = windows, 1, 4, easeOut
  animation = windowsIn, 1, 5, smoothOpen, popin 85%
  animation = fade, 1, 3, easeOut
  animation = fadeIn, 1, 5, smoothOpen
  animation = workspaces, 1, 4, easeOut
}

input {
  follow_mouse = 1
  sensitivity = 0

  touchpad {
    natural_scroll = false
  }
}

misc {
  disable_hyprland_logo = true
  force_default_wallpaper = 0
  # Let Vicinae (and other launchers) grab focus when they request activation.
  focus_on_activate = true
}

# Vicinae launcher: blur the wlr-layer-shell surface so it reads as frosted
# glass over the desktop (namespace matches the launcher's layer surface).
layerrule = match:namespace ^(vicinae)$, blur true
layerrule = match:namespace ^(vicinae)$, ignore_alpha 0.3

xwayland {
  # Render XWayland (X11) clients at native pixel density and let Hyprland scale the
  # surface, instead of letting XWayland bitmap-upscale itself at fractional monitor
  # scales. Without this, Chromium/Electron apps on XWayland (Helium, web-apps) look
  # blurry/pixelated on HiDPI/fractional displays. Matches omarchy's default.
  force_zero_scaling = true
}

binds {
  pass_mouse_when_bound = false
  scroll_event_delay = 0
}

bind = SUPER, Return, exec, $terminal
bind = SUPER, T, exec, $terminal
bind = SUPER, E, exec, $fileManager
bind = SUPER ALT, E, exec, $yaziFileManager
bind = SUPER, B, exec, $heliumBrowser
bind = SUPER, N, exec, $neovimEditor
bind = SUPER ALT, O, exec, $obsidianNotes
bind = SUPER, R, exec, $menu
bind = SUPER, Space, exec, $menu
bind = SUPER, V, exec, $clipboard
bind = SUPER, G, exec, $gameBar
bind = SUPER, comma, exec, $systemPanel
bind = SUPER, W, exec, $wallpaperSwitcher
bind = SUPER SHIFT, comma, exec, $hyprlandSettings
bind = SUPER SHIFT, R, exec, hyprctl reload
bind = SUPER ALT, L, exec, $lockscreen
bind = SUPER, P, exec, $powerMenu
bind = SUPER, Q, killactive,
bind = ALT, F4, killactive,
bind = SUPER SHIFT, Q, killactive,
bind = SUPER SHIFT, E, exit,
bind = SUPER, F, fullscreen,
bind = SUPER, A, exec, $toggleFloat
bindmd = SUPER, mouse:272, Move window, movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow

bind = , Print, exec, $screenshot
bind = SHIFT, Print, exec, $regionScreenshot
bind = SUPER, S, exec, $screenshotChooser

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10
bind = SUPER CTRL, 1, movetoworkspace, 1
bind = SUPER CTRL, 2, movetoworkspace, 2
bind = SUPER CTRL, 3, movetoworkspace, 3
bind = SUPER CTRL, 4, movetoworkspace, 4
bind = SUPER CTRL, 5, movetoworkspace, 5
bind = SUPER CTRL, 6, movetoworkspace, 6
bind = SUPER CTRL, 7, movetoworkspace, 7
bind = SUPER CTRL, 8, movetoworkspace, 8
bind = SUPER CTRL, 9, movetoworkspace, 9
bind = SUPER CTRL, 0, movetoworkspace, 10
bind = SUPER, Page_Down, workspace, e+1
bind = SUPER, Page_Up, workspace, e-1
bind = SUPER, mouse_down, exec, $workspaceScrollPrev
bind = SUPER, mouse_up, exec, $workspaceScrollNext

bind = SUPER, Left, movefocus, l
bind = SUPER, Right, movefocus, r
bind = SUPER, Up, movefocus, u
bind = SUPER, Down, movefocus, d
bind = SUPER, H, movefocus, l
bind = SUPER, J, movefocus, d
bind = SUPER, K, movefocus, u
bind = SUPER, L, movefocus, r
bind = SUPER SHIFT, Left, movewindow, l
bind = SUPER SHIFT, Right, movewindow, r
bind = SUPER SHIFT, Up, movewindow, u
bind = SUPER SHIFT, Down, movewindow, d
bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, J, movewindow, d
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, L, movewindow, r

windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, float true
windowrule = match:title ^(Picture-in-Picture)$, float true
windowrule = match:class ^(io.github.bluemancz.hyprmod)$, float true
windowrule = match:class ^(io.github.bluemancz.hyprmod)$, center true
windowrule = match:class ^(org.ryoku.screensaver)$, fullscreen true
windowrule = match:class ^(ryoku-control)$, float true
windowrule = match:class ^(ryoku-control)$, size 1280 720
windowrule = match:class ^(ryoku-control)$, center true
windowrule = match:class ^(ryoku-update)$, float true
windowrule = match:class ^(ryoku-update)$, size 900 560
windowrule = match:class ^(ryoku-update)$, center true

# HyprMod managed settings
source = ~/.config/hypr/hyprland-gui.conf

# Keep web apps and games fully opaque while preserving HyprMod transparency for normal windows.
windowrule = opacity 1.0 override 1.0 override 1.0 override, match:class ^(chrome|chromium|google-chrome|brave|brave-browser|microsoft-edge|opera|vivaldi)-.+-Default$
windowrule = opacity 1.0 override 1.0 override 1.0 override, match:initial_class ^(chrome|chromium|google-chrome|brave|brave-browser|microsoft-edge|opera|vivaldi)-.+-Default$
windowrule = opacity 1.0 override 1.0 override 1.0 override, match:class ^(helium|Helium)$
windowrule = opacity 1.0 override 1.0 override 1.0 override, match:initial_class ^(helium|Helium)$
windowrule = opacity 1.0 override 1.0 override 1.0 override, match:content game
windowrule = opacity 1.0 override 1.0 override 1.0 override, match:class ^(steam_app_[0-9]+|gamescope)$
windowrule = opacity 1.0 override 1.0 override 1.0 override, match:initial_class ^(steam_app_[0-9]+|gamescope)$
windowrule = opaque true, match:class ^(chrome|chromium|google-chrome|brave|brave-browser|microsoft-edge|opera|vivaldi)-.+-Default$
windowrule = opaque true, match:initial_class ^(chrome|chromium|google-chrome|brave|brave-browser|microsoft-edge|opera|vivaldi)-.+-Default$
windowrule = opaque true, match:class ^(helium|Helium)$
windowrule = opaque true, match:initial_class ^(helium|Helium)$
windowrule = opaque true, match:content game
windowrule = opaque true, match:class ^(steam_app_[0-9]+|gamescope)$
windowrule = opaque true, match:initial_class ^(steam_app_[0-9]+|gamescope)$
windowrule = force_rgbx true, match:class ^(chrome|chromium|google-chrome|brave|brave-browser|microsoft-edge|opera|vivaldi)-.+-Default$
windowrule = force_rgbx true, match:initial_class ^(chrome|chromium|google-chrome|brave|brave-browser|microsoft-edge|opera|vivaldi)-.+-Default$
windowrule = force_rgbx true, match:class ^(helium|Helium)$
windowrule = force_rgbx true, match:initial_class ^(helium|Helium)$
windowrule = force_rgbx true, match:content game
windowrule = force_rgbx true, match:class ^(steam_app_[0-9]+|gamescope)$
windowrule = force_rgbx true, match:initial_class ^(steam_app_[0-9]+|gamescope)$

# User-owned overrides. Ryoku never overwrites this file, and it is sourced last
# so your binds and settings take precedence over the shipped defaults above.
# Put custom keybinds, window rules, env vars, etc. here.
source = ~/.config/hypr/custom.conf
