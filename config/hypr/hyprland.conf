source = ~/.config/hypr/colors.conf

monitor = eDP-1, preferred, 0x0, 1.25
monitor = , preferred, auto, auto

$terminal = kitty
$fileManager = dolphin
$menu = fuzzel
$clipboard = sh -lc 'cliphist list | fuzzel --dmenu --prompt="Clipboard: " | cliphist decode | wl-copy'
$systemPanel = missioncenter
$powerMenu = sh -lc 'choice=$(printf "Lock\nLogout\nSuspend\nReboot\nShutdown\n" | fuzzel --dmenu --prompt="Power: "); case "$choice" in Lock) loginctl lock-session ;; Logout) hyprctl dispatch exit ;; Suspend) systemctl suspend ;; Reboot) systemctl reboot ;; Shutdown) systemctl poweroff ;; esac'
$regionScreenshot = sh -lc 'mkdir -p "$HOME/Pictures/Screenshots"; grim -g "$(slurp)" "$HOME/Pictures/Screenshots/screenshot-$(date +%Y%m%d-%H%M%S).png"'

exec-once = hypridle -c ~/.config/hypr/hypridle-rebirth.conf
exec-once = nm-applet
exec-once = kdeconnectd
exec-once = kdeconnect-indicator
exec-once = wl-paste --watch cliphist store

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = MOZ_ENABLE_WAYLAND,1
env = GDK_SCALE,1
env = GDK_DPI_SCALE,1

general {
  gaps_in = 5
  gaps_out = 16
  border_size = 2
  col.active_border = $primary $tertiary 45deg
  col.inactive_border = $surface_container $outline 45deg
  resize_on_border = true
  layout = dwindle
}

decoration {
  rounding = 12
  active_opacity = 0.98
  inactive_opacity = 0.92

  shadow {
    enabled = true
    range = 12
    render_power = 4
    color = $shadow
  }

  blur {
    enabled = true
    size = 8
    passes = 3
    new_optimizations = true
  }
}

animations {
  enabled = true
  bezier = easeOut,0.23,1,0.32,1
  animation = windows, 1, 4, easeOut
  animation = fade, 1, 3, easeOut
  animation = workspaces, 1, 4, easeOut
}

input {
  kb_layout = us
  follow_mouse = 1
  sensitivity = 0

  touchpad {
    natural_scroll = false
  }
}

misc {
  disable_hyprland_logo = true
  force_default_wallpaper = 0
}

bind = SUPER, Return, exec, $terminal
bind = SUPER, T, exec, $terminal
bind = SUPER, E, exec, $fileManager
bind = SUPER, R, exec, $menu
bind = SUPER, Space, exec, $menu
bind = SUPER, V, exec, $clipboard
bind = SUPER, S, exec, $systemPanel
bind = SUPER SHIFT, R, exec, hyprctl reload
bind = SUPER ALT, L, exec, loginctl lock-session
bind = SUPER, P, exec, $powerMenu
bind = SUPER, Q, killactive,
bind = ALT, F4, killactive,
bind = SUPER SHIFT, Q, killactive,
bind = SUPER SHIFT, E, exit,
bind = SUPER, F, fullscreen,
bind = SUPER, A, togglefloating,

bind = , Print, exec, grim "$HOME/Pictures/Screenshots/screenshot-$(date +%Y%m%d-%H%M%S).png"
bind = SHIFT, Print, exec, grim -g "$(slurp)" "$HOME/Pictures/Screenshots/screenshot-$(date +%Y%m%d-%H%M%S).png"
bind = SUPER SHIFT, S, exec, $regionScreenshot

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10
bind = SUPER CTRL, 1, movetoworkspace, 1
bind = SUPER CTRL, 2, movetoworkspace, 2
bind = SUPER CTRL, 3, movetoworkspace, 3
bind = SUPER CTRL, 4, movetoworkspace, 4
bind = SUPER CTRL, 5, movetoworkspace, 5
bind = SUPER CTRL, 6, movetoworkspace, 6
bind = SUPER CTRL, 7, movetoworkspace, 7
bind = SUPER CTRL, 8, movetoworkspace, 8
bind = SUPER CTRL, 9, movetoworkspace, 9
bind = SUPER CTRL, 0, movetoworkspace, 10
bind = SUPER, Page_Down, workspace, e+1
bind = SUPER, Page_Up, workspace, e-1

bind = SUPER, Left, movefocus, l
bind = SUPER, Right, movefocus, r
bind = SUPER, Up, movefocus, u
bind = SUPER, Down, movefocus, d
bind = SUPER, H, movefocus, l
bind = SUPER, J, movefocus, d
bind = SUPER, K, movefocus, u
bind = SUPER, L, movefocus, r
bind = SUPER SHIFT, Left, movewindow, l
bind = SUPER SHIFT, Right, movewindow, r
bind = SUPER SHIFT, Up, movewindow, u
bind = SUPER SHIFT, Down, movewindow, d
bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, J, movewindow, d
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, L, movewindow, r

windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, float true
windowrule = match:title ^(Picture-in-Picture)$, float true
