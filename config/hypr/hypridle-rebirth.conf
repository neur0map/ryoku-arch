# hypridle config for the rebirth Hyprland path.
# Replaces swayidle in Ryoku's services/Idle.qml (which is patched by
# install/config/ryoku-shell-branding.sh:apply_idle_disable_swayidle to
# skip its swayidle spawn).
#
# hypridle's lock_cmd is fired via logind's LockSession DBus signal. Ryoku
# calls qylock's upstream Quickshell lockscreen directly so qylock can be
# updated from its Git checkout without Ryoku patching its QML.

general {
    lock_cmd         = /bin/sh -c 'exec env -u QS_CONFIG_NAME -u QS_CONFIG_PATH -u QS_MANIFEST "$HOME/.local/share/quickshell-lockscreen/lock.sh"'
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = ryoku-session-recover --quiet --resume
    inhibit_sleep    = 3
}

# 5 minutes idle: play the preserved terminal screensaver. Do not power the
# monitors off here; the screensaver is the visible idle state.
listener {
    timeout    = 300
    on-timeout = /bin/sh -c 'exec "$HOME/.local/share/ryoku/bin/ryoku-launch-screensaver"'
    on-resume  = /bin/sh -c 'pkill -f org.ryoku.screensaver 2>/dev/null || true; ryoku-session-recover --quiet --resume'
}

# 10 minutes idle: ask logind to lock, which fires lock_cmd above.
listener {
    timeout    = 600
    on-timeout = loginctl lock-session
}

# 5.5 minutes idle: turn off keyboard backlight (restore on activity)
listener {
    timeout    = 330
    on-timeout = brightnessctl -sd '*::kbd_backlight' set 0
    on-resume  = brightnessctl -rd '*::kbd_backlight'
}
