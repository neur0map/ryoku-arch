source = ~/.config/ryoku/current/theme/hyprlock.conf

general {
    ignore_empty_input = true
    hide_cursor = true
    immediate_render = true
    fail_timeout = 1500
}

background {
    monitor =
    color = $color
    path = ~/.config/ryoku/current/background
    blur_passes = 3
    blur_size = 8
    contrast = 0.85
    brightness = 0.80
    vibrancy = 0.16
    vibrancy_darkness = 0.0
}

animations {
    enabled = false
}

# Clock
label {
    monitor =
    text = cmd[update:30000] date +"%H:%M"
    color = $font_color
    font_size = 104
    font_family = iA Writer Mono S
    position = 0, 180
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = $font_color
    font_size = 18
    font_family = iA Writer Mono S
    position = 0, 100
    halign = center
    valign = center
}

# Ryoku kanji: 力 (chikara / strength)
label {
    monitor =
    text = 力
    color = $check_color
    font_size = 80
    font_family = Noto Sans CJK JP
    position = 0, 10
    halign = center
    valign = center
}

# Password input: pinned on top via zindex so no other label can occlude it
input-field {
    monitor =
    size = 420, 60
    position = 0, -100
    halign = center
    valign = center
    zindex = 10

    inner_color = $inner_color
    outer_color = $outer_color
    outline_thickness = 2

    font_family = iA Writer Mono S
    font_color = $font_color

    placeholder_text =
    check_color = $check_color
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    rounding = 6
    shadow_passes = 0
    fade_on_empty = false
    dots_center = true
    dots_size = 0.3
    dots_spacing = 0.2
}

# Tagline: 力と美のために (for the sake of power and beauty)
label {
    monitor =
    text = 力と美のために
    color = $font_color
    font_size = 13
    font_family = Noto Sans CJK JP
    position = 0, 40
    halign = center
    valign = bottom
}

auth {
    pam:enabled = true
    pam:module = hyprlock
    fingerprint:enabled = false
}
