# hyprland.conf sources this file LAST, so anything you set wins over the
# shipped Ryoku defaults: rebind keys, add window rules, set env vars, etc.
#
# Examples:
#   bind = SUPER, Return, exec, alacritty
#   windowrule = float, match:class ^(pavucontrol)$
#   env = MY_VAR,value
