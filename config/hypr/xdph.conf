# xdg-desktop-portal-hyprland config (Ryoku).
#
# allow_token_by_default lets the portal remember your last screen-share selection
# instead of re-prompting (or silently failing) on every stream, which is what
# Discord, OBS, Google Meet and other screen-share/streaming apps expect.
#
# The default share picker (hyprland-share-picker, shipped with
# xdg-desktop-portal-hyprland) is used on purpose: do NOT pin custom_picker_binary
# here. A stale pin to an uninstalled picker breaks source selection entirely
# (this is exactly what left screen sharing broken after the old
# hyprland-preview-share-picker was dropped).
screencopy {
    allow_token_by_default = true
}
