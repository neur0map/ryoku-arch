# Managed by Ryoku Display settings (ryoku-monitor).
# Edits here may be overwritten; use Settings > Display.

# No per-output line is shipped on purpose: every monitor uses the catch-all below.
# The catch-all uses an explicit 1.25 scale (a sensible default for high-DPI laptop
# panels) instead of Hyprland's "auto", which over-zooms to 2x on those panels.
# XWayland crispness/size is handled via force_zero_scaling + per-app device scale.
# Per-output overrides written here by Settings > Display (ryoku-monitor) as explicit
# "WxH@Hz, XxY, scale" lines take precedence.

# Catch-all for monitors not configured above (hotplug-friendly).
monitor = , highrr, auto, 1.25
