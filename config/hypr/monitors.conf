# Managed by Ryoku Display settings (ryoku-monitor).
# Edits here may be overwritten; use Settings > Display.

# No per-output line is shipped on purpose: every monitor uses the catch-all below, so
# display scale is never hardcoded distro-wide. A baked-in fractional scale (e.g. 1.25)
# blurs XWayland apps on panels that don't want it. Per-output overrides are written
# here by Settings > Display (ryoku-monitor) as explicit "WxH@Hz, XxY, scale" lines.

# Catch-all for monitors not configured above (hotplug-friendly).
monitor = , highrr, auto, auto
