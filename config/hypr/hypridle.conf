# hypridle config , niri-adapted from the original Omarchy/Ryoku design.
# Replaces swayidle in Ryoku's services/Idle.qml (which is patched by
# install/config/ryoku-shell-branding.sh:apply_idle_disable_swayidle to
# skip its swayidle spawn).
#
# Why hypridle instead of swayidle:
#   - hypridle's `inhibit_sleep` is supposed to block suspend until the
#     lock surface is fully secure. On niri this requires the
#     hyprland-lock-notify-v1 protocol extension which niri does NOT yet
#     implement, so inhibit_sleep is currently a no-op here. We keep it
#     set so a future niri version will pick it up automatically.
#   - hypridle's lock_cmd is fired via logind's LockSession DBus signal
#     (universal , works on niri). Unlike Ryoku's embedded Lock.qml, the
#     external hyprlock binary renders <100ms and survives niri's
#     ~1-second secure-surface timeout, eliminating the lock-self-release
#     race that plagued Ryoku's Lock on lid-close.
#
# Lock surface choice , hyprlock (separate process, race-immune) for
# automated / suspend-driven locks; Ryoku's Lock.qml stays wired to
# Mod+Alt+L (interactive only) where the niri timeout race doesn't apply.

general {
    # `hyprlock --immediate` is deprecated in 0.9.5+; immediate_render is
    # already set in config/hypr/hyprlock.conf [general]. Plain `hyprlock`
    # is the correct invocation.
    lock_cmd         = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = niri msg action power-on-monitors
    inhibit_sleep    = 3
}

# 5 minutes idle: turn screen off (and on when activity resumes)
listener {
    timeout    = 300
    on-timeout = niri msg action power-off-monitors
    on-resume  = niri msg action power-on-monitors
}

# 10 minutes idle: lock the screen via DBus (which fires lock_cmd above)
listener {
    timeout    = 600
    on-timeout = loginctl lock-session
}

# 5.5 minutes idle: turn off keyboard backlight (restore on activity)
listener {
    timeout    = 330
    on-timeout = brightnessctl -sd '*::kbd_backlight' set 0
    on-resume  = brightnessctl -rd '*::kbd_backlight'
}
