[templates.dashboard]
input_path = "colors.json"
output_path = "~/.cache/ryoku/dashboard/colors.json"

# Ryoku's Vicinae launcher theme. Rendered into the official Vicinae theme
# directory; settings.json selects the theme named "ryoku" for both light and
# dark, so the launcher follows the active wallpaper palette.
[templates.vicinae]
input_path = "vicinae.toml"
output_path = "~/.local/share/vicinae/themes/ryoku.toml"

[config.custom_colors.red]
color = "#FF0000"
blend = true

[config.custom_colors.green]
color = "#00FF00"
blend = true

[config.custom_colors.yellow]
color = "#FFFF00"
blend = true

[config.custom_colors.blue]
color = "#0000FF"
blend = true

[config.custom_colors.magenta]
color = "#FF00FF"
blend = true

[config.custom_colors.cyan]
color = "#00FFFF"
blend = true

[config.custom_colors.white]
color = "#FFFFFF"
blend = true
