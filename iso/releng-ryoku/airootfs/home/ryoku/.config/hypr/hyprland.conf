# Minimal Hyprland config for the Ryoku live ISO. Boots straight into a
# fullscreen Alacritty running the Ryoku welcome greeter.

monitor = , preferred, auto, 1

env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland
env = QT_QPA_PLATFORM, wayland
env = MOZ_ENABLE_WAYLAND, 1

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 0
    layout = dwindle
}

decoration {
    rounding = 0
}

animations {
    enabled = false
}

input {
    kb_layout = us
    follow_mouse = 1
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = 0x171717
}

windowrulev2 = fullscreen, class:^(Alacritty)$

exec-once = swaybg -c '#171717' &
exec-once = alacritty -e ryoku-welcome

# Quick exit hotkey for testers.
bind = SUPER, Q, killactive
bind = SUPER SHIFT, E, exit
