# Ryoku live user, created at first boot by systemd-sysusers.
# Group memberships are not added here; modern Wayland + systemd-logind
# delegates device access via ACLs on the active seat, so wheel/video/input
# are not required for the live ISO. Sudo works via /etc/sudoers.d/ryoku.
g ryoku 1000
u ryoku 1000:1000 "Ryoku Live" /home/ryoku /usr/bin/bash
