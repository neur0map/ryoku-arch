# Ryoku laptop lid policy. Shipped by ryoku-desktop to
# /etc/systemd/logind.conf.d/10-ryoku-lid.conf.
#
# logind suspends on lid close in EVERY case (battery, external power, docked).
# The only thing that ever keeps a closed lid awake is the ryoku-clamshell
# daemon, which holds a handle-lid-switch inhibitor while the machine is on AC
# power AND an external display is connected (macOS-style clamshell). Overriding
# the docked default (ignore) is deliberate: a mere external display must not
# keep the lid awake on battery -- power is required, matching macOS.
[Login]
HandleLidSwitch=suspend
HandleLidSwitchExternalPower=suspend
HandleLidSwitchDocked=suspend
