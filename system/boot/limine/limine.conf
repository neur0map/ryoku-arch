# Ryoku limine config = global look + branding only. deployed by the installer
# to /boot/limine.conf (the ESP root) -- the ONE config limine-entry-tool
# manages: limine-mkinitcpio-hook regenerates the UKI entries and
# limine-snapper-sync adds the Snapshots submenu in this same file, preserving
# these globals. never place a limine.conf in any other search location
# (/boot/limine/, EFI/limine/, ...): Limine stops at the first match and the
# generated entries (kernels, snapshots) would be shadowed. upstream directives:
# https://github.com/limine-bootloader/limine/blob/trunk/CONFIG.md
#
# keep in sync with limineBranding in ryoku/cli/doctor.go (the live-system
# migration writes the same header).

timeout: 3

# entry 1 is the /+Ryoku *directory* once limine-mkinitcpio-hook owns the
# menu; a directory can't autoboot (Limine parks on the menu). 2 = the newest
# UKI inside it. the installer rewrites this to 1 while the menu is still the
# flat placeholder below (offline install, pre-AUR).
default_entry: 2

interface_branding: Ryoku Bootloader
# Limine 12+ wants literal RRGGBB here, not an ANSI palette index. Ryoku
# orange, direct.
interface_branding_color: F25623
interface_help_color: F25623
hash_mismatch_panic: no

term_background: 171717
backdrop: 171717

# Greek Noir, matches the Ryoku theme + the Plymouth splash.
term_palette: 171717;aeab94;F25623;4D4D4D;88A57D;F56E0F;8A8A8A;bcbfbc
term_palette_bright: 333333;aeab94;F25623;4D4D4D;88A57D;F56E0F;8A8A8A;757d75

term_foreground: CCD0CF
term_foreground_bright: CCD0CF
term_background_bright: 333333

# fallback entry shape for installs where limine-mkinitcpio-hook never ran
# (offline). the installer appends the real flat entry itself; the hook
# replaces all of this with the /+Ryoku UKI tree (EFI/Linux/ryoku_linux.efi)
# on its first run.
/Ryoku Linux
    protocol: efi
    path: boot():/EFI/Linux/ryoku_linux.efi
