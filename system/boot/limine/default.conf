# lives at /etc/default/limine. limine-mkinitcpio-hook reads this to build
# the UKI(s) and regenerate the boot entries in /boot/limine.conf (the ESP
# root -- the only location limine-entry-tool manages).

TARGET_OS_NAME="Ryoku"

ESP_PATH="/boot"

# @@CMDLINE@@ = installer (bootloader.sh) substitutes the real root cmdline:
# root=/dev/mapper/root rootflags=subvol=@ rw, plus cryptdevice=UUID=<luks>:root
# when LUKS is on. "quiet splash" is always appended so Plymouth owns the screen.
KERNEL_CMDLINE[default]+="@@CMDLINE@@"
KERNEL_CMDLINE[default]+=" quiet splash"

ENABLE_UKI=yes
CUSTOM_UKI_NAME="ryoku"

ENABLE_LIMINE_FALLBACK=yes

# detect + chainload any other installed bootloaders.
FIND_BOOTLOADERS=yes

BOOT_ORDER="*, *fallback, Snapshots"

# btrfs snapshot entries (limine-snapper-sync wires these up).
MAX_SNAPSHOT_ENTRIES=5

SNAPSHOT_FORMAT_CHOICE=5
