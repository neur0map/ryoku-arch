# initramfs HOOKS, dropped into /etc/mkinitcpio.conf at install.
#
# 'plymouth' sits right after 'udev' so the splash owns the screen ASAP. 'kms'
# loads the GPU driver inside the initramfs for a flicker-free handoff to
# Plymouth and the DM.
#
# 'encrypt' = LUKS only. installer keeps it for encrypted root, strips it
# otherwise so plain systems don't drag in cryptsetup for nothing (the
# installer's `sed 's/ encrypt\b//'` deletes exactly that one word).
#
# 'resume' comes right AFTER 'encrypt' (so a LUKS root is unlocked before the
# hook looks for the swapfile) and stays a separate word, so the encrypt-strip
# above never touches it. it restores a hibernation image when the bootloader
# passes resume=/resume_offset= (set only when a swapfile exists); with no such
# cmdline it is a harmless no-op, so keeping it on every install is safe.

HOOKS=(base udev plymouth keyboard autodetect microcode modconf kms keymap consolefont block encrypt resume filesystems fsck)
