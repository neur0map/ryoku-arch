# wallust does one job: extract the palette from the wallpaper into
# ~/.cache/wallust/colors.json (the shell's source of truth, tuned by ryowalls).
# matugen owns all app templating (kitty, Hyprland, GTK, Qt, btop) from that one
# palette, so a follow-mode wallpaper change renders each app config exactly
# once. wallust used to render kitty and hypr here too, but matugen overwrote
# them a moment later at the same paths, so those templates were dropped.
[templates]
shell = { src = "colors.json.tmpl", dst = "~/.cache/wallust/colors.json" }
