[config]

# colors.json (the shell's own palette) is authored by the Go control plane;
# matugen fans that same palette into the core desktop surface below. These
# templates always render: the terminal, the Hyprland frame, the system
# monitor, and the Qt toolkit the shell itself is built on. The GTK / GUI-app
# fan-out lives in apps.toml, gated by the "Theme apps" toggle (theme.json
# themeApps), so a user can keep third-party apps stock while the shell tracks
# the palette.

[templates.kitty]
input_path = "~/.config/matugen/templates/kitty-colors.conf"
output_path = "~/.config/kitty/current-theme.conf"

[templates.hypr]
input_path = "~/.config/matugen/templates/hypr-colors.lua"
output_path = "~/.cache/wallust/hypr-colors.lua"

[templates.btop]
input_path = "~/.config/matugen/templates/btop.theme"
output_path = "~/.config/btop/themes/ryoku.theme"

[templates.qt6ct]
input_path = "~/.config/matugen/templates/qt6ct-colors.conf"
output_path = "~/.config/qt6ct/colors/ryoku.conf"
