# Yazi file manager.
#
# Editor opener: upstream Ryoku routes text/code files through
# `ryoku-launch-editor`, which is not present on a slim Arch + Ryoku box.
# Here `edit` runs Neovim directly with `block = true`, so nvim takes over
# yazi's terminal until you quit it.

[mgr]
# Show dotfiles (e.g. ~/.config) in listings.
show_hidden = true

[opener]
edit = [
  { run = 'nvim "$@"', block = true, desc = 'Edit with Neovim', for = 'unix' },
]

[open]
prepend_rules = [
  { mime = 'text/*', use = 'edit' },
  { mime = 'application/json', use = 'edit' },
  { mime = 'application/xml', use = 'edit' },
  { url = '*.toml', use = 'edit' },
  { url = '*.json', use = 'edit' },
  { url = '*.kdl', use = 'edit' },
  { url = '*.yml', use = 'edit' },
  { url = '*.yaml', use = 'edit' },
  { url = '*.conf', use = 'edit' },
]
