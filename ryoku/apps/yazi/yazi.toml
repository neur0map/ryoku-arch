# yazi.
#
# editor opener: upstream Ryoku punts text/code through `ryoku-launch-editor`,
# which isn't present on a slim Arch+Ryoku box. so `edit` runs nvim directly
# with block=true (nvim owns yazi's terminal until you quit it).

[mgr]
# show dotfiles in listings.
show_hidden = true

[opener]
edit = [
  { run = 'nvim "$@"', block = true, desc = 'Edit with Neovim', for = 'unix' },
]

[open]
prepend_rules = [
  { mime = 'text/*', use = 'edit' },
  { mime = 'application/json', use = 'edit' },
  { mime = 'application/xml', use = 'edit' },
  { url = '*.toml', use = 'edit' },
  { url = '*.json', use = 'edit' },
  { url = '*.kdl', use = 'edit' },
  { url = '*.yml', use = 'edit' },
  { url = '*.yaml', use = 'edit' },
  { url = '*.conf', use = 'edit' },
]
