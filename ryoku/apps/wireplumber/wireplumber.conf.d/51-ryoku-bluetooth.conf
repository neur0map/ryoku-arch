# Ryoku Bluetooth audio: mSBC wideband speech for calls (16 kHz instead of the
# telephone-muffled 8 kHz CVSD; classic Bluetooth cannot do hi-fi output and a
# mic at once, so this is the best the headset profile allows), and hi-fi A2DP
# codecs preferred over plain SBC for music. Users can override any of it in
# ~/.config/wireplumber/wireplumber.conf.d/.
monitor.bluez.properties = {
  bluez5.enable-sbc-xq = true
  bluez5.enable-msbc = true
  bluez5.enable-hw-volume = true
  bluez5.codecs = [ ldac aptx_hd aptx aac sbc_xq sbc ]
  bluez5.hfphsp-backend = "native"
}
