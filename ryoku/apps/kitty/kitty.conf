# Font
font_family      SpaceMono Nerd Font
font_size        11.0

# Cursor
cursor_shape     beam
cursor_trail     1

# Window
window_margin_width     8
confirm_os_window_close 0

# shell: our fish prints the branded readout on terminal open.
shell /usr/bin/fish

# theme palette sits next to this file.
include current-theme.conf

# Copy / paste
map ctrl+c       copy_or_interrupt
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Scroll
map page_up      scroll_page_up
map page_down    scroll_page_down

# Zoom
map ctrl+plus        change_font_size all +1
map ctrl+equal       change_font_size all +1
map ctrl+kp_add      change_font_size all +1
map ctrl+minus       change_font_size all -1
map ctrl+underscore  change_font_size all -1
map ctrl+kp_subtract change_font_size all -1
map ctrl+0           change_font_size all 0
map ctrl+kp_0        change_font_size all 0

# user overrides: ~/.config/kitty/user.conf is never shipped, never touched on
# update, loads last so your stuff wins. globinclude is silent if missing.
globinclude user.conf
