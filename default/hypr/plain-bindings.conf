# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(ryoku-cmd-terminal-cwd)"
bindd = SUPER SHIFT, RETURN, Browser, exec, ryoku-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(ryoku-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, ryoku-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, ryoku-launch-browser --private
bindd = SUPER SHIFT, N, Editor, exec, ryoku-launch-editor

# Add extra bindings
# bindd = SUPER SHIFT, R, exec, alacritty -e ssh your-server

# Overwrite existing bindings, like putting Ryoku Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Ryoku menu, exec, ryoku-menu
