# Ensure the Ryoku command directory is on PATH for every process
# Hyprland spawns (bindings, exec-once, etc.). The session env that
# uwsm loads at startup already exports this path, but this Hyprland-
# level env line is a belt-and-suspenders guarantee so direct exec
# bindings like 'ryoku-menu' resolve even when the uwsm env layer is
# stripped (systemd-run, certain chroot scenarios, etc.).
env = PATH,$HOME/.local/share/ryoku/bin:/usr/local/sbin:/usr/local/bin:/usr/bin:/usr/bin/site_perl:/usr/bin/vendor_perl:/usr/bin/core_perl:$HOME/.local/bin

# Cursor theme + size. Without an explicit theme env, Hyprland falls
# back to the X11 default cursor (the small "X" arrow), which looks
# off-brand on first login. Adwaita ships with adwaita-cursors and is
# the default GNOME cursor; Hyprcursor uses the same theme name.
env = XCURSOR_THEME,Adwaita
env = HYPRCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Force all apps to use Wayland
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_STYLE_OVERRIDE,kvantum
env = SDL_VIDEODRIVER,wayland,x11
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = OZONE_PLATFORM,wayland
env = XDG_SESSION_TYPE,wayland

# Allow better support for screen sharing (Google Meet, Discord, etc)
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

xwayland {
  force_zero_scaling = true
}

# Use XCompose file
env = XCOMPOSEFILE,~/.XCompose

# Don't show update on first launch
ecosystem {
  no_update_news = true
}
