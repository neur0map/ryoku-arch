### Read more at config document: https://github.com/limine-bootloader/limine/blob/trunk/CONFIG.md
#timeout: 3
default_entry: 2
interface_branding: Ryoku Bootloader
# Limine 12 changed interface_branding_color from an ANSI 0-7 index
# resolved via term_palette to a literal RRGGBB hex value. Use Ryoku
# orange directly so the boot menu branding stays on-brand. On older
# limine (11.x) the previous value 2 worked because term_palette slot
# 2 also mapped to F25623; if you change the palette, change here too.
interface_branding_color: F25623
interface_help_color: F25623
hash_mismatch_panic: no

term_background: 171717
backdrop: 171717

# Terminal colors (Greek Noir palette, matches themes/greek-noir)
term_palette: 171717;aeab94;F25623;4D4D4D;88A57D;F56E0F;8A8A8A;bcbfbc
term_palette_bright: 333333;aeab94;F25623;4D4D4D;88A57D;F56E0F;8A8A8A;757d75

# Text colors
term_foreground: CCD0CF
term_foreground_bright: CCD0CF
term_background_bright: 333333
