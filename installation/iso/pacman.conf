#
# pacman.conf for mkarchiso when it builds the Ryoku live airootfs.
# see pacman.conf(5) for the option / repo directives.
#

[options]
HoldPkg     = pacman glibc
Architecture = auto
ParallelDownloads = 5

# SigLevel here = accept anything signed by a key in pacman's local keyring,
# plus unsigned. mkarchiso runs `pacman-key --init` + `--populate` in the
# work dir.
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

# [ryoku] -- the signed desktop repo, wired in so the live installer set can
# pull ryoku-cursors (the configured Bibata cursor theme) and the kiosk shows
# the real pointer instead of an X11 bitmap. build.sh populates a local file://
# repo (from RYOKU_ISO_LOCAL_REPO, a release/repo/out tree, or a fetch from
# repo.ryoku.dev) and rewrites the @RYOKU_ISO_REPO@ token below to it at stage
# time; the token never resolves on its own.
#
# SigLevel here is TrustAll, scoped to THIS build-time file:// repo only: the
# packages were either built in this checkout or fetched over TLS from our own
# repo. The INSTALLED system re-verifies everything against its own strict
# SigLevel=Required conf (installation/backend/lib/deploy.sh) -- do not relax
# that one.
[ryoku]
SigLevel = Optional TrustAll
Server = file://@RYOKU_ISO_REPO@