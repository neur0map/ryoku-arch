#
# pacman.conf used by mkarchiso to build the Ryoku live airootfs.
# See the pacman.conf(5) manpage for option and repository directives.
#

[options]
HoldPkg     = pacman glibc
Architecture = auto
ParallelDownloads = 5

# Accept packages signed by keys pacman's local keyring trusts, plus unsigned
# packages. mkarchiso runs `pacman-key --init` and `--populate` in the work dir.
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist
