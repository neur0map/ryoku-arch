LABEL ryoku
TEXT HELP
Boot the Ryoku Linux installer on BIOS.
The graphical installer starts automatically.
ENDTEXT
MENU LABEL Ryoku Linux installer (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=1G quiet loglevel=3 console=ttyS0,115200 console=tty0

LABEL ryoku-nomodeset
TEXT HELP
Boot the installer with kernel mode-setting disabled (safe graphics).
Use this if the screen goes black or garbled at boot.
ENDTEXT
MENU LABEL Ryoku Linux installer (%ARCH%, BIOS) (safe graphics)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=1G quiet loglevel=3 console=ttyS0,115200 console=tty0 nomodeset

LABEL ryoku-copytoram
TEXT HELP
Copy the whole image into RAM before booting, then run without the USB stick.
Slow to start on a slow stick, but resilient to a flaky or removed drive.
ENDTEXT
MENU LABEL Ryoku Linux installer (%ARCH%, BIOS) (copy to RAM, slow USB)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=1G quiet loglevel=3 console=ttyS0,115200 console=tty0 copytoram
