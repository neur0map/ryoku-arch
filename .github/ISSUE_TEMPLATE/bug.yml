name: Bug
description: Report a reproducible Ryoku bug
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping test Ryoku. Please include enough detail for the issue to be reproduced.

  - type: input
    id: system-details
    attributes:
      label: System details
      placeholder: e.g. AMD 9950X, NVIDIA 5090, Ryoku preview ISO date or commit
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: What's wrong?
      description: Describe the issue, include steps to recreate it if possible, and attach the output of `ryoku-debug` if possible
    validations:
      required: true
