name: R2 maintenance

# Manual R2 housekeeping for the release bucket. Lists every object and verifies
# each signed artifact (.iso / package / db) against the CURRENT release key, so
# anything signed by a rotated-out key is obvious. Clean mode deletes the known
# old-key ISOs left in the bucket from before the key rotation (plus their
# detached signature and checksum sidecars) and re-uploads the current public
# key. Dispatch only; never runs on push or tag.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'list (read-only) or clean (delete old-key ISOs)'
        required: true
        default: 'list'
        type: choice
        options:
          - list
          - clean

permissions:
  contents: read

jobs:
  r2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: R2 housekeeping
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          MODE: ${{ github.event.inputs.mode }}
        run: |
          set -euo pipefail
          curl -fsSL https://rclone.org/install.sh | sudo bash >/dev/null
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [Ryoku]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_ACCESS_KEY_ID}
          secret_access_key = ${R2_SECRET_ACCESS_KEY}
          endpoint = ${R2_ENDPOINT}
          no_check_bucket = true
          EOF

          B="Ryoku:${R2_BUCKET}"
          new_fpr="EB6D3C0F55A7B3CABA6B2838847B274F025DD6E3"
          tmp="$(mktemp -d)"

          gpg --batch --import keys/ryoku-release-key.pub.asc
          echo "${new_fpr}:6:" | gpg --batch --import-ownertrust

          echo "::group::all objects"
          rclone lsl "$B/" 2>&1 || true
          echo "::endgroup::"

          echo "::group::signature audit"
          old_signed=""
          for p in $(rclone lsf -R "$B/" 2>/dev/null); do
            case "$p" in
              */) continue ;;
              *.asc|*.gpg)
                rclone copyto "$B/$p" "$tmp/blob" >/dev/null 2>&1 || continue
                fpr="$(gpg --show-keys --with-colons "$tmp/blob" 2>/dev/null | awk -F: '/^fpr:/{print $10; exit}')"
                [ "$fpr" = "$new_fpr" ] && echo "KEYFILE NEW   $p" || echo "KEYFILE OLD   $p ($fpr)"
                ;;
              *.iso|*.pkg.tar.zst|*.db|*.files|*.db.tar.gz|*.files.tar.gz)
                rm -f "$tmp/f" "$tmp/f.sig"
                rclone lsf "$B/$p.sig" 2>/dev/null | grep -q . || continue
                rclone copyto "$B/$p"     "$tmp/f"     >/dev/null 2>&1 || continue
                rclone copyto "$B/$p.sig" "$tmp/f.sig" >/dev/null 2>&1 || continue
                [ -s "$tmp/f.sig" ] || continue
                if gpg --verify "$tmp/f.sig" "$tmp/f" >/dev/null 2>&1; then
                  echo "SIGNED  NEW   $p"
                else
                  echo "SIGNED  OLD   $p"
                  case "$p" in *.iso) old_signed="$old_signed $p" ;; esac
                fi
                ;;
            esac
          done
          echo "::endgroup::"
          echo "old-key ISOs detected:${old_signed:- none}"

          if [ "$MODE" = "list" ]; then
            echo "::notice::list-only; no changes made"
            exit 0
          fi

          echo "=== CLEAN: removing old-key ISOs (+ .sig / .sha256 sidecars) ==="
          for iso in $old_signed; do
            for f in "$iso" "$iso.sig" "$iso.sha256"; do
              if rclone lsf "$B/$f" 2>/dev/null | grep -q .; then
                echo "deleting $f"
                rclone deletefile "$B/$f" 2>&1 || true
              fi
            done
          done
          echo "re-uploading current public key to iso/ and bucket root"
          rclone copyto keys/ryoku-release-key.pub.asc "$B/iso/ryoku-release-key.pub.asc" -P 2>&1 || true
          rclone copyto keys/ryoku-release-key.pub.asc "$B/ryoku-release-key.pub.asc" -P 2>&1 || true
          echo "::notice::clean complete"
