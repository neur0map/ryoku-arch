name: Build ISO (NixOS)

on:
  workflow_dispatch:
  pull_request:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  # Lightweight gate for pull requests: prove the flake evaluates and the VM
  # host builds, without paying for a full ISO build + qemu boot.
  pr-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: cachix/cachix-action@v15
        with:
          name: ryoku
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # --no-build: evaluate every output (incl. the nixosTest in checks) without
      # running VM tests. Hosted runners lack KVM; the ISO boot smoke-test below
      # is the automated install gate. Run the VM test on KVM with
      # nix build .#checks.x86_64-linux.install-base
      - name: Flake check (eval)
        run: nix flake check --no-build --print-build-logs

      - name: Build VM host toplevel
        run: nix build .#nixosConfigurations.vm.config.system.build.toplevel --print-build-logs

      # Boots a tiny service-only VM and asserts P4/P5 (no failed units,
      # NetworkManager active). TCG on hosted runners, but the system is minimal
      # so it finishes fast. install-base needs KVM and is run on a dev box.
      - name: Health VM test (P4/P5)
        run: nix build .#checks.x86_64-linux.health --print-build-logs

  build:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      # Official Determinate installer: flakes + nix-command on by default.
      - uses: DeterminateSystems/nix-installer-action@main

      # Cachix pulls prebuilt Ryoku paths for fast CI and pushes freshly built
      # ones so end users never recompile. authToken is only needed to push.
      - uses: cachix/cachix-action@v15
        with:
          name: ryoku
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Free runner disk (ISO build is about 10 GB transient)
        run: |
          sudo rm -rf /opt/hostedtoolcache /usr/share/dotnet /opt/ghc \
                      /usr/local/lib/android /usr/local/share/boost
          df -h /

      - name: Flake check (eval)
        run: nix flake check --no-build --print-build-logs

      - name: Health VM test (P4/P5)
        run: nix build .#checks.x86_64-linux.health --print-build-logs

      # Pinned entirely by the committed flake.lock. .#iso is the isoImage
      # build product of nixosConfigurations.iso.
      - name: Build ISO
        run: nix build .#iso --print-build-logs

      - name: Stage artifact
        id: iso
        run: |
          iso=$(ls -L result/iso/*.iso)
          cp "$iso" "ryoku-${GITHUB_REF_NAME:-dev}.iso"
          echo "path=ryoku-${GITHUB_REF_NAME:-dev}.iso" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ryoku-iso
          path: ${{ steps.iso.outputs.path }}
          retention-days: 14
      # (re-attach GPG sign / sha256 / R2 upload / Discord from the old workflow here)

  smoke-test:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ryoku-iso

      - name: Install qemu
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86

      # Boot the ISO headless on a serial console and assert the live system
      # boots. GitHub hosted runners have no KVM, so this is TCG (software
      # emulation): slow but enough for a boot smoke test. The hybrid ISO boots
      # via SeaBIOS (no OVMF needed just to verify boot). The branded installer
      # UI runs on tty1 (framebuffer); the serial console carries boot progress
      # and the autologin shell, which is what is asserted here.
      - name: Boot ISO and assert it reaches the live system
        run: |
          iso=$(ls *.iso)
          timeout 1200 qemu-system-x86_64 \
            -m 4096 -smp 2 \
            -cdrom "$iso" -boot d \
            -nographic -serial mon:stdio -display none \
            > boot.log 2>&1 &
          qpid=$!
          for i in $(seq 1 120); do
            if grep -qE 'Welcome to NixOS|Reached target .*Multi-User|nixos login' boot.log; then
              echo "::notice::ISO booted to the live NixOS system."
              kill "$qpid" 2>/dev/null || true
              exit 0
            fi
            kill -0 "$qpid" 2>/dev/null || break
            sleep 10
          done
          echo "::error::ISO did not reach the live system within budget"
          tail -100 boot.log
          exit 1
