name: Build ISO

# builds the Ryoku live ISO via installation/iso/build.sh, signs it with the
# release GPG key, ships the signed image to Cloudflare R2.
#
# publish is intentional only: this fires on a v* release tag (cut from main)
# or a manual dispatch. no branch-push trigger, so commits to unstable-dev
# never publish anything user-facing.

on:
  workflow_dispatch:
    inputs:
      release_stage:
        description: 'Public release stage'
        required: true
        default: 'beta'
        type: choice
        options:
          - alpha
          - beta
          - stable
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  # Trivy uploads the ISO scan to the Security tab as SARIF.
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      RELEASE_STAGE: ${{ github.event.inputs.release_stage || 'beta' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # build.sh stages the repo payload via `git archive HEAD`, which
          # only wants the working tree's git objects; full history is cheap
          # here and keeps tag-described metadata around.
          fetch-depth: 0
          # never persist the Actions token into .git/config; the build runs
          # git inside a container against the checked-out tree.
          persist-credentials: false

      - name: Prepare release metadata
        run: |
          short_sha="${GITHUB_SHA::7}"
          tracking_id="r${GITHUB_RUN_NUMBER}-${short_sha}"
          {
            echo "RYOKU_ISO_TRACKING_ID=$tracking_id"
            echo "RYOKU_ISO_COMMIT=$GITHUB_SHA"
            echo "RYOKU_ISO_RUN_ID=$GITHUB_RUN_ID"
            echo "RYOKU_ISO_RUN_NUMBER=$GITHUB_RUN_NUMBER"
            echo "RYOKU_ISO_RUN_URL=$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo "RYOKU_ISO_CHANNEL=$RELEASE_STAGE"
            echo "RYOKU_ISO_INSTALLER_REF=main"
            # public base the manifest urls point at: where R2 actually serves
            # these files and where the site (ryoku-site DownloadSection.vue)
            # reads them. the release bucket is served at iso.ryoku.dev/stable/
            # regardless of the stage label, so without this the manifest's
            # "url"/"urls.*" fields ship empty.
            echo "RYOKU_ISO_PUBLIC_BASE=https://iso.ryoku.dev/stable"
          } >> "$GITHUB_ENV"
          echo "::notice::Ryoku ISO tracking ID: $tracking_id"

      - name: Verify required secrets are present
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          missing=()
          [[ -z "$R2_ACCESS_KEY_ID" ]]      && missing+=("R2_ACCESS_KEY_ID")
          [[ -z "$R2_SECRET_ACCESS_KEY" ]]  && missing+=("R2_SECRET_ACCESS_KEY")
          [[ -z "$R2_ENDPOINT" ]]           && missing+=("R2_ENDPOINT")
          [[ -z "$GPG_PRIVATE_KEY" ]]       && missing+=("GPG_PRIVATE_KEY")
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "See docs/release-pipeline.md for setup."
            exit 1
          fi
          echo "::notice::Building Ryoku ISO (release stage: $RELEASE_STAGE)"

      - name: Free disk space on runner
        run: |
          # ubuntu-latest ships ~14 GB free; the ISO build wants ~10 GB
          # transient. strip the preinstalled toolchains we don't use, buys
          # headroom before mkarchiso runs in the Arch container.
          sudo rm -rf /opt/hostedtoolcache /usr/share/dotnet /opt/ghc \
                      /usr/local/lib/android /usr/local/share/boost
          docker system prune -af
          df -h /

      - name: Build ISO
        run: |
          set -euo pipefail

          # mkarchiso is Arch-only and wants root + the build toolchain that
          # bakes the prebuilt binaries and the Ryoku.Blobs plugin into the
          # image, so the whole build runs inside a privileged archlinux
          # container. --privileged lets pacstrap bind-mount /proc /sys /dev
          # into the airootfs while it runs.
          #
          # mkarchiso's work/staging trees live on a host bind mount (real
          # ext4 under RUNNER_TEMP), not the container's overlay layer (which
          # can't back every fs op pacstrap performs). only the finished ISO
          # lands back in the workspace at installation/iso/out.
          work="$RUNNER_TEMP/ryoku-iso-build"
          mkdir -p "$work" installation/iso/out

          # reproducible iso_version/iso_label: profiledef.sh + mkarchiso
          # both read SOURCE_DATE_EPOCH.
          source_epoch="$(date -u +%s)"

          docker run --rm --privileged \
            -v "$GITHUB_WORKSPACE":/repo \
            -v "$work":/work \
            -w /repo/installation/iso \
            -e SOURCE_DATE_EPOCH="$source_epoch" \
            -e RYOKU_ISO_OUT=/repo/installation/iso/out \
            -e RYOKU_ISO_WORK=/work/work \
            -e RYOKU_ISO_STAGE=/work/staging \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            archlinux:latest \
            bash -euo pipefail -c '
              # refresh the keyring first: a stale base image cannot verify
              # packages signed by newly-added packager keys and the upgrade
              # aborts. then full upgrade + install (never a partial -Sy alone).
              pacman -Sy --noconfirm archlinux-keyring
              pacman -Su --noconfirm --needed \
                archiso git go base-devel cmake ninja \
                qt6-base qt6-declarative qt6-shadertools
              # checkout is owned by the runner UID, not container root;
              # build.sh runs `git archive` against it.
              git config --global --add safe.directory /repo
              ./build.sh
              # hand the finished ISO back to the runner user so the
              # host-side sign/checksum/upload steps can read + write next to it.
              chown -R "$HOST_UID:$HOST_GID" /repo/installation/iso/out
            '

          ls -la installation/iso/out/

          # mkarchiso's work tree (root-owned, on the RUNNER_TEMP bind mount)
          # outlives the --rm container; drop it now to free disk for the
          # Trivy rootfs copy below.
          sudo rm -rf "$work"

      - name: Capture ISO path
        id: iso
        run: |
          iso=$(ls -t installation/iso/out/*.iso | head -n1)
          base=$(basename "$iso")
          # rename to the tracked public name the manifest + website expect:
          # ryoku-<date>-r<run>-<sha>-x86_64-<installer_ref>.iso
          if [[ $base =~ ^(ryoku-[0-9]{4}\.[0-9]{2}\.[0-9]{2})-(x86_64)\.iso$ ]]; then
            tracked="$(dirname "$iso")/${BASH_REMATCH[1]}-${RYOKU_ISO_TRACKING_ID}-${BASH_REMATCH[2]}-${RYOKU_ISO_INSTALLER_REF}.iso"
            mv "$iso" "$tracked"
            iso="$tracked"
          fi
          echo "path=$iso" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$iso")" >> "$GITHUB_OUTPUT"

      - name: Mount ISO live root for Trivy
        run: |
          set -euo pipefail

          iso="${{ steps.iso.outputs.path }}"
          iso_mount="$RUNNER_TEMP/ryoku-iso-mount"
          rootfs_mount="$RUNNER_TEMP/ryoku-iso-rootfs-mount"
          rootfs_scan="$RUNNER_TEMP/ryoku-iso-rootfs"
          mkdir -p "$iso_mount" "$rootfs_mount" "$rootfs_scan"
          {
            echo "RYOKU_TRIVY_ISO_MOUNT=$iso_mount"
            echo "RYOKU_TRIVY_ROOTFS_MOUNT=$rootfs_mount"
            echo "RYOKU_TRIVY_ROOTFS=$rootfs_scan"
          } >> "$GITHUB_ENV"

          sudo mount -o loop,ro "$iso" "$iso_mount"

          mapfile -t squashfs_candidates < <(
            find "$iso_mount" -type f \( -name '*airootfs*.sfs' -o -name '*.sfs' \) | sort
          )
          if (( ${#squashfs_candidates[@]} == 0 )); then
            echo "::error::No SquashFS root filesystem found inside $iso"
            find "$iso_mount" -maxdepth 4 -type f | sort
            exit 1
          fi

          squashfs="${squashfs_candidates[0]}"
          sudo mount -o loop,ro "$squashfs" "$rootfs_mount"
          echo "RYOKU_TRIVY_SQUASHFS=$squashfs" >> "$GITHUB_ENV"
          sudo rsync -aH --numeric-ids "$rootfs_mount/" "$rootfs_scan/"
          sudo chmod -R u+rwX,go+rX "$rootfs_scan"

          echo "::notice::Prepared readable Trivy rootfs scan copy from $squashfs."

      - name: Generate ISO Trivy SARIF report
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: rootfs
          scan-ref: ${{ env.RYOKU_TRIVY_ROOTFS }}
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-iso-results.sarif
          limit-severities-for-sarif: true
          # skip the runtime mount points (empty in the squashfs), the pacman
          # package cache, and the baked payload's bulky wallpaper/brand
          # assets at /usr/share/ryoku/ryoku/assets. prebuilt Go binaries and
          # the rest of the payload stay in scope.
          skip-dirs: proc,sys,dev,run,tmp,var/cache/pacman/pkg,usr/share/ryoku/ryoku/assets
          version: v0.70.0

      - name: Upload ISO Trivy SARIF report
        if: ${{ always() && hashFiles('trivy-iso-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: trivy-iso-results.sarif
          category: trivy-iso

      - name: Block ISO critical CVEs and misconfigurations
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: rootfs
          scan-ref: ${{ env.RYOKU_TRIVY_ROOTFS }}
          scanners: vuln,misconfig
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1
          format: table
          skip-dirs: proc,sys,dev,run,tmp,var/cache/pacman/pkg,usr/share/ryoku/ryoku/assets
          skip-setup-trivy: true

      - name: Unmount ISO live root
        if: ${{ always() }}
        run: |
          set +e

          if [[ -n ${RYOKU_TRIVY_ROOTFS_MOUNT:-} ]]; then
            sudo umount "$RYOKU_TRIVY_ROOTFS_MOUNT" 2>/dev/null || true
            sudo rm -rf "$RYOKU_TRIVY_ROOTFS_MOUNT"
          fi

          if [[ -n ${RYOKU_TRIVY_ROOTFS:-} ]]; then
            sudo rm -rf "$RYOKU_TRIVY_ROOTFS"
          fi

          if [[ -n ${RYOKU_TRIVY_ISO_MOUNT:-} ]]; then
            sudo umount "$RYOKU_TRIVY_ISO_MOUNT" 2>/dev/null || true
            sudo rm -rf "$RYOKU_TRIVY_ISO_MOUNT"
          fi

      - name: Sign ISO with GPG
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          # import the private key into a fresh ephemeral keyring. GNUPGHOME
          # is a runner-local temp dir; the key never hits persistent storage.
          export GNUPGHOME="$(mktemp -d)"
          chmod 700 "$GNUPGHOME"
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import

          iso="${{ steps.iso.outputs.path }}"
          if [[ -n "$GPG_PASSPHRASE" ]]; then
            echo "$GPG_PASSPHRASE" | gpg --batch --pinentry-mode loopback \
              --passphrase-fd 0 --output "$iso.sig" --detach-sign "$iso"
          else
            gpg --batch --output "$iso.sig" --detach-sign "$iso"
          fi

          gpg --verify "$iso.sig" "$iso"

          # ship the public key alongside the ISO so testers can verify from
          # the same R2 bucket. mirrors the repo-canonical copy at
          # keys/ryoku-release-key.pub.asc for users who only have the ISO URL.
          pubkey="$(dirname "$iso")/ryoku-release-key.pub.asc"
          gpg --armor --export > "$pubkey"
          echo "::notice::Exported public key to $pubkey"

      - name: Generate release manifest
        run: |
          iso="${{ steps.iso.outputs.path }}"
          # writes <iso>.sha256, <iso>.json, <iso>.js, latest.json + latest.js;
          # the website reads latest.json to surface the newest ISO.
          ./bin/ryoku-iso-manifest "$iso"
          cat "$iso.json"

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Upload to Cloudflare R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [Ryoku]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_ACCESS_KEY_ID}
          secret_access_key = ${R2_SECRET_ACCESS_KEY}
          endpoint = ${R2_ENDPOINT}
          # The scoped R2 API token has Object Read+Write only, not bucket-level
          # perms. Without this flag rclone calls HeadBucket then CreateBucket,
          # both of which 403, and the upload aborts. The bucket already exists.
          no_check_bucket = true
          EOF

          # R2_BUCKET = the shared release bucket, served at the channel root
          # (iso.ryoku.dev/<channel>/). publish the tracked ISO, signature,
          # checksum, per-ISO manifests, and the latest.json/latest.js pointer
          # the website reads. the [ryoku] pacman repo owns the per-arch
          # prefixes in the same bucket; the ISO release lives at the root.
          dest="${R2_BUCKET:-ryoku}"

          iso="${{ steps.iso.outputs.path }}"
          d="$(dirname "$iso")"
          pubkey="$d/ryoku-release-key.pub.asc"
          rclone copy "$iso"           "Ryoku:$dest/" -P
          rclone copy "$iso.sig"       "Ryoku:$dest/" -P
          rclone copy "$iso.sha256"    "Ryoku:$dest/" -P
          rclone copy "$iso.json"      "Ryoku:$dest/" -P
          rclone copy "$iso.js"        "Ryoku:$dest/" -P
          rclone copy "$d/latest.json" "Ryoku:$dest/" -P
          rclone copy "$d/latest.js"   "Ryoku:$dest/" -P
          rclone copy "$pubkey"        "Ryoku:$dest/" -P

          echo "::notice::Uploaded ISO + manifests to R2 path Ryoku:$dest/"

      - name: Upload artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: ryoku-iso
          path: |
            installation/iso/out/*.iso
            installation/iso/out/*.sig
            installation/iso/out/*.sha256
            installation/iso/out/*.asc
          retention-days: 14

      - name: Notify Discord of the ISO build
        # runs on success and failure; never fails the build itself.
        if: ${{ always() }}
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BUILD_STATUS: ${{ job.status }}
          ISO_NAME: ${{ steps.iso.outputs.name }}
        run: |
          set -euo pipefail

          if [[ -z "${DISCORD_WEBHOOK_URL:-}" ]]; then
            echo "::notice::DISCORD_WEBHOOK_URL not configured; skipping ISO build notification."
            exit 0
          fi

          run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          brand_mark_url="https://raw.githubusercontent.com/$GITHUB_REPOSITORY/main/ryoku/assets/brand/logo-mark.png"

          case "$BUILD_STATUS" in
            success) title="Ryoku ISO build succeeded"; color=3066993;  image="${ISO_NAME:-unknown}" ;;
            failure) title="Ryoku ISO build failed";    color=15158332; image="(no image produced)" ;;
            *)       title="Ryoku ISO build ${BUILD_STATUS}"; color=10070709; image="${ISO_NAME:-n/a}" ;;
          esac

          jq -n \
            --arg title "$title" \
            --arg url "$run_url" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg tracking "${RYOKU_ISO_TRACKING_ID:-unknown}" \
            --arg channel "${RYOKU_ISO_CHANNEL:-beta}" \
            --arg ref "${GITHUB_REF_NAME:-$GITHUB_SHA}" \
            --arg image "$image" \
            --arg brand_mark_url "$brand_mark_url" \
            --argjson color "$color" \
            '{
              username: "Ryoku CI",
              avatar_url: $brand_mark_url,
              allowed_mentions: { parse: [] },
              embeds: [{
                title: $title,
                url: $url,
                color: $color,
                thumbnail: { url: $brand_mark_url },
                fields: [
                  { name: "Repository", value: $repo, inline: true },
                  { name: "Tracking ID", value: $tracking, inline: true },
                  { name: "Channel", value: $channel, inline: true },
                  { name: "Ref", value: $ref, inline: true },
                  { name: "Image", value: $image, inline: false }
                ],
                footer: {
                  text: "Ryoku Arch : For the sake of power and beauty.",
                  icon_url: $brand_mark_url
                },
                timestamp: (now | todateiso8601)
              }]
            }' > /tmp/discord-iso-payload.json

          http_code="$(
            curl -sS -o /tmp/discord-iso-response.json -w "%{http_code}" \
              -H "Content-Type: application/json" \
              -X POST \
              --data-binary @/tmp/discord-iso-payload.json \
              "$DISCORD_WEBHOOK_URL"
          )"

          if [[ "$http_code" != "200" && "$http_code" != "204" ]]; then
            echo "::warning::Discord webhook returned HTTP $http_code"
            cat /tmp/discord-iso-response.json >&2
            exit 1
          fi
          echo "ISO build Discord notification sent (status: $BUILD_STATUS)."
