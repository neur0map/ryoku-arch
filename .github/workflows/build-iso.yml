name: Build ISO (NixOS)

on:
  workflow_dispatch:
  pull_request:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  # Lightweight gate for pull requests: prove the flake evaluates and the VM
  # host builds, without paying for a full ISO build + qemu boot.
  pr-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: cachix/cachix-action@v15
        with:
          name: ryoku
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Flake check
        run: nix flake check --print-build-logs

      - name: Build VM host toplevel
        run: nix build .#nixosConfigurations.vm.config.system.build.toplevel --print-build-logs

  build:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      # Official Determinate installer: flakes + nix-command on by default.
      - uses: DeterminateSystems/nix-installer-action@main

      # Cachix pulls prebuilt Ryoku paths for fast CI and pushes freshly built
      # ones so end users never recompile. authToken is only needed to push.
      - uses: cachix/cachix-action@v15
        with:
          name: ryoku
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Free runner disk (ISO build is about 10 GB transient)
        run: |
          sudo rm -rf /opt/hostedtoolcache /usr/share/dotnet /opt/ghc \
                      /usr/local/lib/android /usr/local/share/boost
          df -h /

      - name: Flake check
        run: nix flake check --print-build-logs

      # Pinned entirely by the committed flake.lock. .#iso is the isoImage
      # build product of nixosConfigurations.iso.
      - name: Build ISO
        run: nix build .#iso --print-build-logs

      - name: Stage artifact
        id: iso
        run: |
          iso=$(ls -L result/iso/*.iso)
          cp "$iso" "ryoku-${GITHUB_REF_NAME:-dev}.iso"
          echo "path=ryoku-${GITHUB_REF_NAME:-dev}.iso" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ryoku-iso
          path: ${{ steps.iso.outputs.path }}
          retention-days: 14
      # (re-attach GPG sign / sha256 / R2 upload / Discord from the old workflow here)

  smoke-test:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ryoku-iso

      - name: Install qemu
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 ovmf

      # Boot the ISO headless on a serial console and assert it reaches the
      # Ryoku installer. GitHub hosted runners have no KVM, so this is TCG
      # (software emulation): slow but fine for a boot/reach-shell smoke test.
      - name: Boot ISO and assert installer is reached
        run: |
          iso=$(ls *.iso)
          timeout 1200 qemu-system-x86_64 \
            -m 4096 -smp 2 \
            -drive if=pflash,format=raw,readonly=on,file=/usr/share/OVMF/OVMF_CODE.fd \
            -cdrom "$iso" -boot d \
            -nographic -serial mon:stdio -display none \
            | tee boot.log &
          qpid=$!
          # Poll the serial log for proof of life. UEFI plus TCG boot to the
          # installer takes minutes; succeed as soon as the marker appears.
          for i in $(seq 1 120); do
            if grep -qE 'Ryoku NixOS Installer|For the sake of power and beauty|reached target' boot.log; then
              echo "::notice::ISO booted and Ryoku installer reached."
              kill "$qpid" 2>/dev/null || true
              exit 0
            fi
            sleep 10
          done
          echo "::error::ISO did not reach the installer within budget"
          cat boot.log
          exit 1
