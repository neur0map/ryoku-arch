name: Build ISO

on:
  workflow_dispatch:
    inputs:
      release_stage:
        description: 'Public release stage'
        required: true
        default: 'alpha'
        type: choice
        options:
          - alpha
          - beta
          - stable
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CHANNEL: main
      PUBLIC_CHANNEL: stable
      RELEASE_STAGE: ${{ github.event.inputs.release_stage || 'alpha' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release metadata
        run: |
          short_sha="${GITHUB_SHA::7}"
          tracking_id="r${GITHUB_RUN_NUMBER}-${short_sha}"
          build_epoch="$(date -u +%s)"
          build_date="$(date -u --date="@$build_epoch" +%Y.%m.%d)"
          {
            echo "SOURCE_DATE_EPOCH=$build_epoch"
            echo "RYOKU_ISO_TRACKING_ID=$tracking_id"
            echo "RYOKU_ISO_COMMIT=$GITHUB_SHA"
            echo "RYOKU_ISO_RUN_ID=$GITHUB_RUN_ID"
            echo "RYOKU_ISO_RUN_NUMBER=$GITHUB_RUN_NUMBER"
            echo "RYOKU_ISO_RUN_URL=$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo "RYOKU_ISO_CHANNEL=$PUBLIC_CHANNEL"
            echo "RYOKU_ISO_BUILD_DATE=$build_date"
            echo "RYOKU_ISO_BUILD_SHA=$GITHUB_SHA"
            echo "RYOKU_ISO_BUILD_URL=$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          } >> "$GITHUB_ENV"
          echo "::notice::Ryoku ISO tracking ID: $tracking_id"

      - name: Verify required secrets are present
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          missing=()
          [[ -z "$R2_ACCESS_KEY_ID" ]]      && missing+=("R2_ACCESS_KEY_ID")
          [[ -z "$R2_SECRET_ACCESS_KEY" ]]  && missing+=("R2_SECRET_ACCESS_KEY")
          [[ -z "$R2_ENDPOINT" ]]           && missing+=("R2_ENDPOINT")
          [[ -z "$GPG_PRIVATE_KEY" ]]       && missing+=("GPG_PRIVATE_KEY")
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "See docs/release-pipeline.md for setup."
            exit 1
          fi

      - name: Free disk space on runner
        run: |
          # ubuntu-latest ships ~14 GB free; the ISO build needs ~10 GB
          # transient. Strip preinstalled toolchains we do not use to
          # buy headroom before the docker build runs.
          sudo rm -rf /opt/hostedtoolcache /usr/share/dotnet /opt/ghc \
                      /usr/local/lib/android /usr/local/share/boost
          docker system prune -af
          df -h /

      - name: Build ISO
        run: |
          ./iso/bin/ryoku-iso-make --local-source --no-boot-offer
          ls -la iso/release/

      - name: Capture ISO path
        id: iso
        run: |
          iso=$(ls -t iso/release/*.iso | head -n1)
          echo "path=$iso" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$iso")" >> "$GITHUB_OUTPUT"

      - name: Mount ISO live root for Trivy
        run: |
          set -euo pipefail

          iso="${{ steps.iso.outputs.path }}"
          iso_mount="$RUNNER_TEMP/ryoku-iso-mount"
          rootfs_mount="$RUNNER_TEMP/ryoku-iso-rootfs-mount"
          rootfs_scan="$RUNNER_TEMP/ryoku-iso-rootfs"
          mkdir -p "$iso_mount" "$rootfs_mount" "$rootfs_scan"
          {
            echo "RYOKU_TRIVY_ISO_MOUNT=$iso_mount"
            echo "RYOKU_TRIVY_ROOTFS_MOUNT=$rootfs_mount"
            echo "RYOKU_TRIVY_ROOTFS=$rootfs_scan"
          } >> "$GITHUB_ENV"

          sudo mount -o loop,ro "$iso" "$iso_mount"

          mapfile -t squashfs_candidates < <(
            find "$iso_mount" -type f \( -name '*airootfs*.sfs' -o -name '*.sfs' \) | sort
          )
          if (( ${#squashfs_candidates[@]} == 0 )); then
            echo "::error::No SquashFS root filesystem found inside $iso"
            find "$iso_mount" -maxdepth 4 -type f | sort
            exit 1
          fi

          squashfs="${squashfs_candidates[0]}"
          sudo mount -o loop,ro "$squashfs" "$rootfs_mount"
          echo "RYOKU_TRIVY_SQUASHFS=$squashfs" >> "$GITHUB_ENV"
          sudo rsync -aH --numeric-ids "$rootfs_mount/" "$rootfs_scan/"
          sudo chmod -R u+rwX,go+rX "$rootfs_scan"

          echo "::notice::Prepared readable Trivy rootfs scan copy from $squashfs."

      - name: Generate ISO Trivy SARIF report
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: rootfs
          scan-ref: ${{ env.RYOKU_TRIVY_ROOTFS }}
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-iso-results.sarif
          limit-severities-for-sarif: true
          skip-dirs: proc,sys,dev,run,tmp,var/cache/pacman/pkg,var/cache/ryoku/mirror/offline,var/cache/ryoku/uv,var/cache/ryoku/nvim,root/ryoku/.git,root/ryoku/assets,root/ryoku/docs/media,root/ryoku/tmp,root/ryoku/shell/docs,root/ryoku/shell/sdata,root/ryoku/shell/scripts/__pycache__
          version: v0.70.0

      - name: Upload ISO Trivy SARIF report
        if: ${{ always() && hashFiles('trivy-iso-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: trivy-iso-results.sarif
          category: trivy-iso

      - name: Block ISO critical CVEs and misconfigurations
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: rootfs
          scan-ref: ${{ env.RYOKU_TRIVY_ROOTFS }}
          scanners: vuln,misconfig
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1
          format: table
          skip-dirs: proc,sys,dev,run,tmp,var/cache/pacman/pkg,var/cache/ryoku/mirror/offline,var/cache/ryoku/uv,var/cache/ryoku/nvim,root/ryoku/.git,root/ryoku/assets,root/ryoku/docs/media,root/ryoku/tmp,root/ryoku/shell/docs,root/ryoku/shell/sdata,root/ryoku/shell/scripts/__pycache__
          skip-setup-trivy: true

      - name: Unmount ISO live root
        if: ${{ always() }}
        run: |
          set +e

          if [[ -n ${RYOKU_TRIVY_ROOTFS_MOUNT:-} ]]; then
            sudo umount "$RYOKU_TRIVY_ROOTFS_MOUNT" 2>/dev/null || true
            sudo rm -rf "$RYOKU_TRIVY_ROOTFS_MOUNT"
          fi

          if [[ -n ${RYOKU_TRIVY_ROOTFS:-} ]]; then
            sudo rm -rf "$RYOKU_TRIVY_ROOTFS"
          fi

          if [[ -n ${RYOKU_TRIVY_ISO_MOUNT:-} ]]; then
            sudo umount "$RYOKU_TRIVY_ISO_MOUNT" 2>/dev/null || true
            sudo rm -rf "$RYOKU_TRIVY_ISO_MOUNT"
          fi

      - name: Sign ISO with GPG
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          # Import the private key into a fresh ephemeral keyring.
          # GNUPGHOME is the runner-local dir we just made; the key
          # never touches /home or persistent storage.
          export GNUPGHOME="$(mktemp -d)"
          chmod 700 "$GNUPGHOME"
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import

          iso="${{ steps.iso.outputs.path }}"
          if [[ -n "$GPG_PASSPHRASE" ]]; then
            echo "$GPG_PASSPHRASE" | gpg --batch --pinentry-mode loopback \
              --passphrase-fd 0 --output "$iso.sig" --detach-sign "$iso"
          else
            gpg --batch --output "$iso.sig" --detach-sign "$iso"
          fi

          gpg --verify "$iso.sig" "$iso"

          # Export the public key alongside the ISO so testers can fetch it
          # from the same R2 bucket. This is in addition to the repo-canonical
          # copy at keys/ryoku-release-key.pub.asc; the R2 copy is a fallback
          # for users who only have the ISO URL and not the GitHub repo.
          pubkey="$(dirname "$iso")/ryoku-release-key.pub.asc"
          gpg --armor --export > "$pubkey"
          echo "::notice::Exported public key to $pubkey"

      - name: Generate SHA256 checksum
        run: |
          iso="${{ steps.iso.outputs.path }}"
          (cd "$(dirname "$iso")" && sha256sum "$(basename "$iso")" "$(basename "$iso").sig" > "$(basename "$iso").sha256")
          cat "$iso.sha256"

      - name: Generate release manifest
        run: |
          iso="${{ steps.iso.outputs.path }}"
          RYOKU_ISO_PUBLIC_BASE="https://iso.ryoku.dev/${PUBLIC_CHANNEL}" ./iso/bin/ryoku-iso-manifest "$iso"
          cat "$iso.json"

      - name: Capture previous ISO release
        id: previous_iso
        run: |
          latest_url="https://iso.ryoku.dev/${PUBLIC_CHANNEL}/latest.json"
          latest_json="$(mktemp)"

          if curl -fsSL --retry 3 --retry-delay 2 "$latest_url" -o "$latest_json"; then
            previous_commit="$(jq -r '.commit // ""' "$latest_json")"

            echo "commit=$previous_commit" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No previous ISO manifest found at $latest_url."
            echo "commit=" >> "$GITHUB_OUTPUT"
          fi

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Upload to Cloudflare R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [Ryoku]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_ACCESS_KEY_ID}
          secret_access_key = ${R2_SECRET_ACCESS_KEY}
          endpoint = ${R2_ENDPOINT}
          # The scoped R2 API token has Object Read+Write only, not
          # bucket-level perms. Without this flag rclone calls
          # HeadBucket then CreateBucket, both of which 403, and the
          # upload aborts. The bucket already exists; skip the check.
          no_check_bucket = true
          EOF

          # R2_BUCKET secret can be either a plain bucket name (e.g.
          # "ryoku-iso") or a path-style "bucket/prefix"
          # (e.g. "ryoku-iso/${PUBLIC_CHANNEL}"). If unset, default to
          # "ryoku/${PUBLIC_CHANNEL}" to match iso.ryoku.dev/stable.
          dest="${R2_BUCKET:-ryoku/$PUBLIC_CHANNEL}"

          iso="${{ steps.iso.outputs.path }}"
          pubkey="$(dirname "$iso")/ryoku-release-key.pub.asc"
          manifest="$iso.json"
          manifest_js="$iso.js"
          latest="$(dirname "$iso")/latest.json"
          latest_js="$(dirname "$iso")/latest.js"
          rclone copy "$iso"        "Ryoku:$dest/" -P
          rclone copy "$iso.sig"    "Ryoku:$dest/" -P
          rclone copy "$iso.sha256" "Ryoku:$dest/" -P
          rclone copy "$manifest"   "Ryoku:$dest/" -P
          rclone copy "$manifest_js" "Ryoku:$dest/" -P
          rclone copy "$latest"     "Ryoku:$dest/" -P
          rclone copy "$latest_js"  "Ryoku:$dest/" -P
          rclone copy "$pubkey"     "Ryoku:$dest/" -P

          echo "::notice::Uploaded to R2 path Ryoku:$dest/"

      - name: Upload artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: ryoku-iso-${{ env.PUBLIC_CHANNEL }}
          path: |
            iso/release/*.iso
            iso/release/*.sig
            iso/release/*.sha256
            iso/release/*.json
            iso/release/*.js
            iso/release/*.asc
          retention-days: 14

      - name: Notify Discord of ISO release
        if: ${{ success() }}
        env:
          DISCORD_ISO_WEBHOOK_URL: ${{ secrets.DISCORD_ISO_WEBHOOK_URL }}
          PREVIOUS_ISO_COMMIT: ${{ steps.previous_iso.outputs.commit }}
        run: |
          set -euo pipefail

          if [[ -z $DISCORD_ISO_WEBHOOK_URL ]]; then
            echo "::notice::DISCORD_ISO_WEBHOOK_URL secret is not configured; skipping Discord ISO notification."
            exit 0
          fi

          manifest="${{ steps.iso.outputs.path }}.json"
          iso_name="${{ steps.iso.outputs.name }}"
          iso_sha="$(jq -r '.sha256.iso' "$manifest")"
          build_date="$(jq -r '.date' "$manifest")"
          tracking_id="$(jq -r '.tracking_id' "$manifest")"
          build_commit="$(jq -r '.commit' "$manifest")"
          short_sha="$(git rev-parse --short "$build_commit")"
          commit_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/commit/$build_commit"
          website_url="https://ryoku.dev"
          brand_mark_url="https://raw.githubusercontent.com/$GITHUB_REPOSITORY/main/assets/brand/logo-mark.png"
          brand_footer="Ryoku Arch : For the sake of power and beauty."

          limit_text() {
            local max="$1"
            local value="$2"

            jq -rn --arg value "$value" --argjson max "$max" '
              $value
              | gsub("\r"; "")
              | if length > $max then .[0:($max - 3)] + "..." else . end
            '
          }

          compare_url=""
          change_summary=""
          previous_commit="$PREVIOUS_ISO_COMMIT"

          if [[ -n $previous_commit ]] && git cat-file -e "$previous_commit^{commit}" 2>/dev/null; then
            if [[ $previous_commit == $build_commit ]]; then
              change_summary="- Rebuild of $short_sha; no new commits since the previous ISO."
              compare_url="$commit_url"
            else
              total_changes="$(git rev-list --count "$previous_commit..$build_commit")"
              change_summary="$(git log --pretty=format:'- %s (%h)' -n 5 "$previous_commit..$build_commit")"
              compare_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/compare/$previous_commit...$build_commit"

              if (( total_changes > 5 )); then
                change_summary="$change_summary"$'\n'"- + $(( total_changes - 5 )) more changes"
              fi
            fi
          else
            change_summary="$(git log --pretty=format:'- %s (%h)' -n 5 "$build_commit")"
            compare_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/commits/main"
          fi

          if [[ -z $change_summary ]]; then
            change_summary="- No commit summary available."
          fi

          download_value="[Open ryoku.dev]($website_url)"$'\n'"Download the ISO, signature, checksum, and public key from the website."
          source_value="[$short_sha]($commit_url) from main"
          release_value="$RELEASE_STAGE build $tracking_id, $build_date"
          verify_value="SHA256: \`$iso_sha\`"
          changes_value="$(limit_text 1000 "$change_summary"$'\n\n'"[Full changes]($compare_url)")"

          jq -n \
            --arg content "Ryoku Arch $RELEASE_STAGE ISO published: $iso_name" \
            --arg title "Ryoku Arch $RELEASE_STAGE ISO published" \
            --arg website_url "$website_url" \
            --arg description "A signed Ryoku Arch $RELEASE_STAGE ISO from main is available on the Ryoku website." \
            --arg download_value "$download_value" \
            --arg release_value "$release_value" \
            --arg source_value "$source_value" \
            --arg changes_value "$changes_value" \
            --arg verify_value "$verify_value" \
            --arg brand_mark_url "$brand_mark_url" \
            --arg brand_footer "$brand_footer" \
            '{
              username: "Ryoku Releases",
              avatar_url: $brand_mark_url,
              content: $content,
              allowed_mentions: {
                parse: []
              },
              embeds: [
                {
                  title: $title,
                  url: $website_url,
                  color: 15881763,
                  description: $description,
                  thumbnail: {
                    url: $brand_mark_url
                  },
                  fields: [
                    {
                      name: "Download",
                      value: $download_value,
                      inline: false
                    },
                    {
                      name: "Release",
                      value: $release_value,
                      inline: false
                    },
                    {
                      name: "Source",
                      value: $source_value,
                      inline: false
                    },
                    {
                      name: "Changes from previous ISO",
                      value: $changes_value,
                      inline: false
                    },
                    {
                      name: "Verification",
                      value: $verify_value,
                      inline: false
                    }
                  ],
                  footer: {
                    text: $brand_footer,
                    icon_url: $brand_mark_url
                  },
                  timestamp: (now | todateiso8601)
                }
              ]
            }' > /tmp/discord-iso-payload.json

          http_code="$(
            curl -sS -o /tmp/discord-iso-response.json -w "%{http_code}" \
              -H "Content-Type: application/json" \
              -X POST \
              --data-binary @/tmp/discord-iso-payload.json \
              "$DISCORD_ISO_WEBHOOK_URL"
          )"

          if [[ $http_code != "200" && $http_code != "204" ]]; then
            echo "Discord ISO webhook returned HTTP $http_code" >&2
            cat /tmp/discord-iso-response.json >&2
            exit 1
          fi

          echo "Discord ISO release notification sent."
