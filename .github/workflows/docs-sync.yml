name: Docs

# repo docs = plain Markdown under docs/ + the top-level READMEs and
# governance files. checks every relative link between them resolves, in
# place of the Mintlify site validation the sibling repo used.
# vendored dep trees are skipped: their upstream docs point at files we don't
# vendor (matches .githooks + the lint gates).

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.github/workflows/docs-sync.yml'
  push:
    branches:
      - main
    paths:
      - '**/*.md'
      - '.github/workflows/docs-sync.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    name: Validate Markdown relative links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check relative links resolve
        shell: bash
        run: |
          set -euo pipefail

          status=0
          while IFS= read -r -d '' md; do
            dir=$(dirname "$md")
            while IFS= read -r target; do
              case "$target" in
                http://*|https://*|mailto:*|\#*|"") continue ;;
              esac
              path=${target%%#*}       # drop any #anchor
              path=${path%% *}         # drop any "title" suffix
              [[ -n $path ]] || continue
              if [[ $path == /* ]]; then
                resolved=".${path}"
              else
                resolved="$dir/$path"
              fi
              if [[ ! -e $resolved ]]; then
                echo "::error file=$md::broken relative link: $target"
                status=1
              fi
            done < <(grep -oE '\]\([^)]+\)' "$md" | sed -E 's/^\]\(//; s/\)$//')
          done < <(git ls-files -z '*.md' ':(glob,exclude)**/vendor/**')

          if (( status == 0 )); then
            echo "All Markdown relative links resolve."
          fi
          exit "$status"
