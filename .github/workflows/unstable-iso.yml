name: Build Unstable ISO

# On-demand test ISO for unstable-dev. Builds the Ryoku live ISO exactly like
# Build ISO does, but publishes NOTHING user-facing: no R2, no GPG signature,
# no manifest, no Trivy gate. The image is kept as a workflow-run artifact for
# private testing / early testers, so it never touches iso.ryoku.dev and never
# gets confused with the production Build ISO pipeline (main / v* tags only).
#
# Trigger: push an unstable-iso-* tag on an unstable-dev commit to build now.
# A tag push runs the workflow file at the tagged commit, so it works before
# this file reaches the default branch; workflow_dispatch only ever shows up
# once it does, so it is kept for the button after the next release FF. The ISO
# stays well under GitHub's per-file limit, so a run artifact is all this needs.

on:
  workflow_dispatch:
  push:
    tags:
      - 'unstable-iso-*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Guard - unstable-dev or an unstable-iso-* tag only
        # runs ONLY on the wrong ref, and always fails there, so a dispatch from
        # main (which has its own Build ISO) or a stray tag stops here. Allows a
        # workflow_dispatch from unstable-dev or any unstable-iso-* build tag.
        if: >-
          github.ref != 'refs/heads/unstable-dev' &&
          !startsWith(github.ref, 'refs/tags/unstable-iso-')
        run: |
          echo "::error::Build Unstable ISO runs only from unstable-dev or an unstable-iso-* tag (got ${GITHUB_REF})."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # build.sh stages the repo payload via `git archive HEAD`.
          fetch-depth: 0
          # never persist the Actions token into .git/config; the build runs
          # git inside a container against the checked-out tree.
          persist-credentials: false

      - name: Prepare metadata
        run: |
          short_sha="${GITHUB_SHA::7}"
          {
            echo "RYOKU_ISO_TRACKING_ID=r${GITHUB_RUN_NUMBER}-${short_sha}"
            echo "RYOKU_ISO_INSTALLER_REF=unstable-dev"
          } >> "$GITHUB_ENV"

      - name: Free disk space on runner
        run: |
          # ubuntu-latest ships ~14 GB free; the ISO build wants ~10 GB
          # transient. strip the preinstalled toolchains we don't use.
          sudo rm -rf /opt/hostedtoolcache /usr/share/dotnet /opt/ghc \
                      /usr/local/lib/android /usr/local/share/boost
          docker system prune -af
          df -h /

      - name: Build ISO
        run: |
          set -euo pipefail

          # mkarchiso is Arch-only and wants root + the toolchain that bakes the
          # prebuilt binaries and the Ryoku.Blobs plugin into the image, so the
          # whole build runs inside a privileged archlinux container.
          # work/staging live on a host bind mount (real ext4 under RUNNER_TEMP),
          # not the container overlay; only the finished ISO lands in the workspace.
          work="$RUNNER_TEMP/ryoku-iso-build"
          mkdir -p "$work" installation/iso/out

          source_epoch="$(date -u +%s)"

          docker run --rm --privileged \
            -v "$GITHUB_WORKSPACE":/repo \
            -v "$work":/work \
            -w /repo/installation/iso \
            -e SOURCE_DATE_EPOCH="$source_epoch" \
            -e RYOKU_ISO_OUT=/repo/installation/iso/out \
            -e RYOKU_ISO_WORK=/work/work \
            -e RYOKU_ISO_STAGE=/work/staging \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            archlinux:latest \
            bash -euo pipefail -c '
              pacman -Sy --noconfirm archlinux-keyring
              pacman -Su --noconfirm --needed \
                archiso git go base-devel cmake ninja \
                qt6-base qt6-declarative qt6-shadertools qt6-multimedia
              git config --global --add safe.directory /repo
              # the production build stages the profile twice and diffs it as a
              # reproducibility gate; a throwaway test ISO needs no such proof,
              # so go straight to build.sh. add ../tests/iso-stage-check.sh back
              # if a test build ever has to match the signed one byte for byte.
              ./build.sh
              chown -R "$HOST_UID:$HOST_GID" /repo/installation/iso/out
            '

          ls -la installation/iso/out/
          sudo rm -rf "$work"

      - name: Capture ISO path
        id: iso
        run: |
          iso=$(ls -t installation/iso/out/*.iso | head -n1)
          base=$(basename "$iso")
          # tag the filename with run + sha + branch so testers can tell builds
          # apart: ryoku-<date>-r<run>-<sha>-x86_64-unstable-dev.iso
          if [[ $base =~ ^(ryoku-[0-9]{4}\.[0-9]{2}\.[0-9]{2})-(x86_64)\.iso$ ]]; then
            tracked="$(dirname "$iso")/${BASH_REMATCH[1]}-${RYOKU_ISO_TRACKING_ID}-${BASH_REMATCH[2]}-${RYOKU_ISO_INSTALLER_REF}.iso"
            mv "$iso" "$tracked"
            iso="$tracked"
          fi
          # a checksum is the only integrity handle testers get (no GPG here).
          sha256sum "$iso" > "$iso.sha256"
          echo "path=$iso" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$iso")" >> "$GITHUB_OUTPUT"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ryoku-unstable-iso
          path: |
            installation/iso/out/*.iso
            installation/iso/out/*.sha256
          retention-days: 14
