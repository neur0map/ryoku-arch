name: Project Triage

# categorises new and edited issues and pull requests into an Area and a Type on
# the Ryoku Roadmap board. an AI pass via GitHub Models proposes the labels; a
# deterministic path/label heuristic backs it up when the model is unavailable or
# returns something outside the allowed sets. board writes need the classic
# PROJECTS_TOKEN because Projects v2 is GraphQL-only. classification never fails
# the run: any miss is a skip, not an error.

on:
  issues:
    types:
      - opened
      - edited
  pull_request_target:
    types:
      - opened
      - edited

permissions:
  contents: read
  models: read

concurrency:
  group: project-triage-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  triage:
    name: Classify and label board item
    runs-on: ubuntu-latest
    timeout-minutes: 6
    env:
      GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
      MODELS_TOKEN: ${{ github.token }}
      PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
      OWNER: ${{ github.repository_owner }}
      REPO_FULL: ${{ github.repository }}
      EVENT_NAME: ${{ github.event_name }}

    steps:
      - name: Triage board item
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::notice::PROJECTS_TOKEN secret is not configured; skipping triage."
            exit 0
          fi
          if [[ -z "${PROJECT_NUMBER:-}" ]]; then
            echo "::notice::PROJECT_NUMBER variable is not configured; run bin/ryoku-project-bootstrap first. Skipping."
            exit 0
          fi

          tmp="${RUNNER_TEMP:-/tmp}"
          event="$GITHUB_EVENT_PATH"

          # read event fields straight from the payload so titles and bodies never
          # reach the shell as code.
          if [[ "$EVENT_NAME" == "issues" ]]; then
            kind="issue"
            content_id="$(jq -r '.issue.node_id' "$event")"
            number="$(jq -r '.issue.number' "$event")"
            title="$(jq -r '.issue.title // ""' "$event")"
            body="$(jq -r '.issue.body // ""' "$event")"
            labels_csv="$(jq -r '[.issue.labels[].name] | join(",")' "$event")"
          else
            kind="pr"
            content_id="$(jq -r '.pull_request.node_id' "$event")"
            number="$(jq -r '.pull_request.number' "$event")"
            title="$(jq -r '.pull_request.title // ""' "$event")"
            body="$(jq -r '.pull_request.body // ""' "$event")"
            labels_csv="$(jq -r '[.pull_request.labels[].name] | join(",")' "$event")"
          fi
          body="${body:0:4000}"

          # changed paths drive the Area heuristic for pull requests.
          paths=""
          if [[ "$kind" == "pr" ]]; then
            paths="$(gh api --paginate "repos/$REPO_FULL/pulls/$number/files" --jq '.[].filename' 2>/dev/null || true)"
          fi

          valid_area() {
            case "$1" in
              global|installation|system|ryoku|docs|test|tooling|release) return 0 ;;
              *) return 1 ;;
            esac
          }
          valid_type() {
            case "$1" in
              Feature|Bug|Chore) return 0 ;;
              *) return 1 ;;
            esac
          }

          heuristic_area() {
            if [[ -n "$paths" ]]; then
              if ! grep -qvE '^tests/' <<<"$paths"; then echo "test"; return; fi
              grep -qE '^ryoku/' <<<"$paths" && { echo "ryoku"; return; }
              grep -qE '^installation/' <<<"$paths" && { echo "installation"; return; }
              grep -qE '^system/' <<<"$paths" && { echo "system"; return; }
              grep -qE '^docs/' <<<"$paths" && { echo "docs"; return; }
              grep -qE '^release/' <<<"$paths" && { echo "release"; return; }
              grep -qE '^(\.github/|bin/|tests/)' <<<"$paths" && { echo "tooling"; return; }
              echo "global"
              return
            fi
            local t
            t="$(printf '%s' "$title" | tr '[:upper:]' '[:lower:]')"
            case "$t" in
              *install*) echo "installation" ;;
              *document*|*docs*) echo "docs" ;;
              *) echo "global" ;;
            esac
          }

          heuristic_type() {
            local l t
            l=",$(printf '%s' "$labels_csv" | tr '[:upper:]' '[:lower:]'),"
            t="$(printf '%s' "$title" | tr '[:upper:]' '[:lower:]')"
            if [[ "$l" == *bug* || "$t" == fix:* || "$t" == bug:* || "$t" == bugfix* ]]; then
              echo "Bug"
              return
            fi
            if [[ "$l" == *feature* || "$l" == *enhancement* || "$t" == feat:* || "$t" == feature:* ]]; then
              echo "Feature"
              return
            fi
            echo "Chore"
          }

          area="$(heuristic_area)"
          type="$(heuristic_type)"
          echo "Heuristic classification: area=$area type=$type"

          # AI pass through GitHub Models; strict JSON is requested and validated,
          # and any failure quietly leaves the heuristic result in place.
          system_prompt='You label GitHub issues and pull requests for a project board. Reply with one minified JSON object and nothing else: {"area": one of [global, installation, system, ryoku, docs, test, tooling, release], "type": one of [Feature, Bug, Chore]}. Prefer the Area that matches the changed paths.'
          user_prompt="$(printf 'Kind: %s\nTitle: %s\nLabels: %s\nChanged paths:\n%s\n\nBody:\n%s' \
            "$kind" "$title" "${labels_csv:-none}" "${paths:-none}" "$body")"

          jq -n --arg s "$system_prompt" --arg u "$user_prompt" '{
            model: "openai/gpt-4o-mini",
            temperature: 0,
            response_format: { type: "json_object" },
            messages: [ { role: "system", content: $s }, { role: "user", content: $u } ]
          }' >"$tmp/models-request.json"

          http="$(curl -sS -o "$tmp/models-response.json" -w '%{http_code}' \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $MODELS_TOKEN" \
            -X POST "https://models.github.ai/inference/chat/completions" \
            --data-binary @"$tmp/models-request.json" 2>/dev/null || echo "000")"

          if [[ "$http" == "200" ]]; then
            content="$(jq -r '.choices[0].message.content // empty' "$tmp/models-response.json" 2>/dev/null || true)"
            if [[ -n "$content" ]]; then
              ai_area="$(jq -r '.area // empty' <<<"$content" 2>/dev/null || true)"
              ai_type="$(jq -r '.type // empty' <<<"$content" 2>/dev/null || true)"
              if valid_area "$ai_area"; then area="$ai_area"; fi
              if valid_type "$ai_type"; then type="$ai_type"; fi
              echo "AI classification: area=${ai_area:-none} type=${ai_type:-none}"
            fi
          else
            echo "::notice::GitHub Models call returned HTTP $http; using heuristic classification."
          fi

          echo "Final classification: area=$area type=$type"

          # resolve the board and its Area/Type fields plus option ids.
          # shellcheck disable=SC2016
          proj_query='query($login: String!, $number: Int!) {
            user(login: $login) {
              projectV2(number: $number) {
                id
                fields(first: 50) {
                  nodes {
                    __typename
                    ... on ProjectV2FieldCommon { id name }
                    ... on ProjectV2SingleSelectField { id name options { id name } }
                  }
                }
              }
            }
          }'
          proj="$(gh api graphql -f query="$proj_query" -f login="$OWNER" -F number="$PROJECT_NUMBER" 2>/dev/null || true)"
          project_id="$(jq -r '.data.user.projectV2.id // empty' <<<"$proj" 2>/dev/null || true)"
          if [[ -z "$project_id" ]]; then
            echo "::notice::Could not resolve project #$PROJECT_NUMBER for $OWNER; skipping board write."
            exit 0
          fi

          area_field="$(jq -r 'first(.data.user.projectV2.fields.nodes[]? | select(.name == "Area") | .id) // empty' <<<"$proj")"
          type_field="$(jq -r 'first(.data.user.projectV2.fields.nodes[]? | select(.name == "Type") | .id) // empty' <<<"$proj")"

          option_id() {
            jq -r --arg f "$1" --arg o "$2" \
              'first(.data.user.projectV2.fields.nodes[]? | select(.name == $f) | .options[]? | select(.name == $o) | .id) // empty' \
              <<<"$proj"
          }

          # ensure the item is on the board (idempotent) and capture its id.
          # shellcheck disable=SC2016
          add_query='mutation($p: ID!, $c: ID!) { addProjectV2ItemById(input: {projectId: $p, contentId: $c}) { item { id } } }'
          item_id="$(gh api graphql -f query="$add_query" -f p="$project_id" -f c="$content_id" \
            --jq '.data.addProjectV2ItemById.item.id' 2>/dev/null || true)"
          if [[ -z "$item_id" ]]; then
            echo "::notice::Board item for $kind #$number not available yet; skipping field write."
            exit 0
          fi

          set_field() {
            local field_id="$1" opt_id="$2" set_query
            [[ -n "$field_id" && -n "$opt_id" ]] || return 0
            # shellcheck disable=SC2016
            set_query='mutation($p: ID!, $i: ID!, $f: ID!, $o: String!) { updateProjectV2ItemFieldValue(input: {projectId: $p, itemId: $i, fieldId: $f, value: {singleSelectOptionId: $o}}) { projectV2Item { id } } }'
            gh api graphql -f query="$set_query" \
              -f p="$project_id" -f i="$item_id" -f f="$field_id" -f o="$opt_id" >/dev/null 2>&1 \
              || echo "::warning::Failed to set a board field for $kind #$number."
          }

          set_field "$area_field" "$(option_id "Area" "$area")"
          set_field "$type_field" "$(option_id "Type" "$type")"

          # mirror the classification onto repo labels; missing labels are created
          # first so the edit cannot fail on an unknown name.
          type_label="type:$(printf '%s' "$type" | tr '[:upper:]' '[:lower:]')"
          area_label="area:$area"
          gh label create "$area_label" --repo "$REPO_FULL" --color "ededed" --force >/dev/null 2>&1 || true
          gh label create "$type_label" --repo "$REPO_FULL" --color "ededed" --force >/dev/null 2>&1 || true

          if [[ "$kind" == "pr" ]]; then
            gh pr edit "$number" --repo "$REPO_FULL" --add-label "$area_label,$type_label" >/dev/null 2>&1 \
              || echo "::warning::Could not apply labels to PR #$number."
          else
            gh issue edit "$number" --repo "$REPO_FULL" --add-label "$area_label,$type_label" >/dev/null 2>&1 \
              || echo "::warning::Could not apply labels to issue #$number."
          fi

          echo "Triaged $kind #$number: area=$area type=$type"
