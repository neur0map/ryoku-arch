name: Shell unit tests

# pure-JS unit tests behind the Quickshell surfaces (launcher fuzzy ranker, the
# ryoshot coords/keymap/annotation libs, and the hub display-arrangement lib). no
# display, no Quickshell dep, so unlike the advisory qmllint job this one is a
# real blocking gate. the runner (tests/shell-unit-tests.sh) discovers every
# ryoku/{shell,hub}/**/*.test.mjs; adding a test needs no change here.

on:
  pull_request:
    paths:
      - 'ryoku/shell/**/*.mjs'
      - 'ryoku/shell/**/*.js'
      - 'ryoku/hub/**/*.mjs'
      - 'ryoku/hub/**/*.js'
      - 'tests/shell-unit-tests.sh'
      - '.github/workflows/shell-unit-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'ryoku/shell/**/*.mjs'
      - 'ryoku/shell/**/*.js'
      - 'ryoku/hub/**/*.mjs'
      - 'ryoku/hub/**/*.js'
      - 'tests/shell-unit-tests.sh'
      - '.github/workflows/shell-unit-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    name: shell unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run shell unit tests
        shell: bash
        run: RYOKU_PATH="$PWD" tests/shell-unit-tests.sh
