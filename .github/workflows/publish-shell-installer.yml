name: Publish shell installer

# shell.ryoku.dev/install.sh is the one-command public entry. It is only the
# bootstrap (shell-install/boot.sh): it clones the repo and runs the live
# installer, so the hosted file rarely changes and the URL never needs to. This
# re-publishes it whenever boot.sh changes on main.
#
# Setup (one time, Cloudflare side): create an R2 bucket, attach shell.ryoku.dev
# as its custom domain (so the bucket root serves at shell.ryoku.dev/), and set
# the R2_SHELL_BUCKET, R2_SHELL_ACCESS_KEY_ID, and R2_SHELL_SECRET_ACCESS_KEY
# secrets (a token with Object Read & Write on that bucket). R2_ENDPOINT is the
# shared account endpoint the ISO build also uses.

on:
  push:
    branches: [main]
    paths:
      - shell-install/boot.sh
      - .github/workflows/publish-shell-installer.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate the bootstrap
        run: bash -n shell-install/boot.sh

      - name: Check R2 secrets
        id: gate
        env:
          R2_SHELL_ACCESS_KEY_ID: ${{ secrets.R2_SHELL_ACCESS_KEY_ID }}
          R2_SHELL_SECRET_ACCESS_KEY: ${{ secrets.R2_SHELL_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_SHELL_BUCKET: ${{ secrets.R2_SHELL_BUCKET }}
        run: |
          if [[ -z "$R2_SHELL_ACCESS_KEY_ID" || -z "$R2_SHELL_SECRET_ACCESS_KEY" || -z "$R2_ENDPOINT" || -z "$R2_SHELL_BUCKET" ]]; then
            echo "::warning::shell R2 secrets not set (need R2_SHELL_ACCESS_KEY_ID, R2_SHELL_SECRET_ACCESS_KEY, R2_ENDPOINT, R2_SHELL_BUCKET); skipping publish."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install rclone
        if: steps.gate.outputs.ready == 'true'
        run: curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Publish boot.sh as install.sh
        if: steps.gate.outputs.ready == 'true'
        env:
          R2_SHELL_ACCESS_KEY_ID: ${{ secrets.R2_SHELL_ACCESS_KEY_ID }}
          R2_SHELL_SECRET_ACCESS_KEY: ${{ secrets.R2_SHELL_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_SHELL_BUCKET: ${{ secrets.R2_SHELL_BUCKET }}
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [Ryoku]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_SHELL_ACCESS_KEY_ID}
          secret_access_key = ${R2_SHELL_SECRET_ACCESS_KEY}
          endpoint = ${R2_ENDPOINT}
          # Scoped R2 token: object read/write only, no bucket-level perms.
          no_check_bucket = true
          EOF
          # shell.ryoku.dev is the bucket's custom domain, so the bucket root is
          # the site root: shell.ryoku.dev/install.sh == <bucket>/install.sh.
          # Always overwrite install.sh; skip the HeadObject/list pre-check so a
          # write-only-scoped R2 token (no ListBucket) still works.
          rclone copyto shell-install/boot.sh "Ryoku:${R2_SHELL_BUCKET}/install.sh" --no-check-dest -P
          echo "::notice::Published shell-install/boot.sh -> shell.ryoku.dev/install.sh (R2: ${R2_SHELL_BUCKET}/install.sh)"
