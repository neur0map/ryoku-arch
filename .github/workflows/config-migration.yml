name: Global change needs a migration

# Ryoku's config contract (docs/ryoku-config-architecture.md): changes are
# fresh-install-only by default and DO NOT touch existing users. The only way a
# change reaches existing installs is a migration, and a change is marked as
# "must reach existing users" with a [global] label in its commit subject.
#
# This gate enforces that contract: if any commit in the PR is [global], the PR
# must also add/modify a migrations/*.sh that carries the delta. Non-[global]
# changes need no migration.

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  global-needs-migration:
    name: '[global] commit must ship a migration'
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce migration for [global] commits
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Any [global]-labelled commit subject in the PR range?
          globals="$(git log --format='%s' "$BASE_SHA..$HEAD_SHA" | grep -F '[global]' || true)"
          if [[ -z $globals ]]; then
            echo "No [global] commits in this PR; migration not required."
            exit 0
          fi

          echo "[global] commit(s) in this PR:"
          printf '  %s\n' "$globals"

          # A migration must be added or modified to carry the delta.
          if git diff --name-only --diff-filter=ACM "$BASE_SHA" "$HEAD_SHA" | grep -qE '^migrations/[0-9]+\.sh$'; then
            echo "OK: PR ships a migration for the [global] change(s)."
            exit 0
          fi

          echo "::error::A [global] commit must ship a migrations/<unix-ts>.sh so the change reaches existing installs (they are seeded copy-if-missing and never re-read shipped config on update). Add one with ryoku-dev-add-migration, or drop the [global] label if this is fresh-install-only."
          exit 1
