name: Project Auto Add

# adds every new or reopened issue and pull request to the Ryoku Roadmap board.
# Projects v2 is GraphQL-only, so this uses the classic PROJECTS_TOKEN, not the
# default GITHUB_TOKEN which cannot touch the board.

on:
  issues:
    types:
      - opened
      - reopened
  pull_request_target:
    types:
      - opened
      - reopened

permissions:
  contents: read

concurrency:
  group: project-auto-add-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  add-to-board:
    name: Add item to Ryoku Roadmap
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PROJECTS_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
      PROJECT_URL: ${{ vars.PROJECT_URL }}

    steps:
      - name: Check board configuration
        id: guard
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${PROJECTS_TOKEN:-}" ]]; then
            echo "::notice::PROJECTS_TOKEN secret is not configured; skipping board add."
            echo "ready=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "${PROJECT_URL:-}" ]]; then
            echo "::notice::PROJECT_URL variable is not configured; run bin/ryoku-project-bootstrap first. Skipping."
            echo "ready=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=true" >>"$GITHUB_OUTPUT"

      - name: Add issue or pull request to project
        if: steps.guard.outputs.ready == 'true'
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: ${{ vars.PROJECT_URL }}
          github-token: ${{ secrets.PROJECTS_TOKEN }}
