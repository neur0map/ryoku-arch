name: R2 debug

# Temporary diagnostic: lists what actually landed in the R2 bucket and checks
# whether the public domains serve it. Used to localize the repo.ryoku.dev 404.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Install rclone
        run: curl -fsSL https://rclone.org/install.sh | sudo bash
      - name: Inspect R2 and public domains
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [Ryoku]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_ACCESS_KEY_ID}
          secret_access_key = ${R2_SECRET_ACCESS_KEY}
          endpoint = ${R2_ENDPOINT}
          no_check_bucket = true
          EOF
          echo "=== buckets visible to this token (lsd) ==="
          rclone lsd Ryoku: 2>&1 | head -20 || echo "lsd not permitted (scoped token)"
          echo "=== bucket contents, depth 2 (paths only, no secrets) ==="
          rclone lsf "Ryoku:$R2_BUCKET" --max-depth 2 2>&1 | head -80 || echo "lsf failed"
          echo "=== x86_64/ listing ==="
          rclone lsf "Ryoku:$R2_BUCKET/x86_64" 2>&1 | head -40 || echo "no x86_64/"
          echo "=== iso/ listing ==="
          rclone lsf "Ryoku:$R2_BUCKET/iso" 2>&1 | head -40 || echo "no iso/"
          echo "=== public domain reachability from CI ==="
          for u in https://repo.ryoku.dev/x86_64/ryoku.db https://iso.ryoku.dev/iso/ryoku-release-key.pub.asc; do
            curl -sS -o /dev/null -w "$u -> %{http_code}\n" "$u" || true
          done
