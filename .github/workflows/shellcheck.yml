name: ShellCheck

on:
  pull_request:
    paths:
      - '**/*.sh'
      - '**/*.bash'
      - 'bin/**'
      - 'installation/**'
      - 'system/**'
      - 'ryoku/**'
      - 'tests/**'
      - '.githooks/**'
      - '.github/workflows/**'
  push:
    branches:
      - main
    paths:
      - '**/*.sh'
      - '**/*.bash'
      - 'bin/**'
      - 'installation/**'
      - 'system/**'
      - 'ryoku/**'
      - 'tests/**'
      - '.githooks/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      scope:
        description: Files to lint
        required: true
        default: changed
        type: choice
        options:
          - changed
          - all

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck changed shell files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ShellCheck
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Collect files
        id: files
        shell: bash
        run: |
          set -euo pipefail

          files="$(mktemp)"
          scope="${{ github.event.inputs.scope || 'changed' }}"

          collect_from_git_stream() {
            while IFS= read -r -d '' file; do
              [[ -f $file ]] || continue
              [[ $file == ryoku/lockscreen/qylock/* ]] && continue

              # Skip non-shell interpreters that live in the same dirs (e.g.
              # Python tools under bin/). ShellCheck would parse them as bash
              # and emit bogus errors.
              if head -n 1 -- "$file" 2>/dev/null \
                | grep -Eq '^#!.*(python|perl|node|ruby|/env[[:space:]]+(python|perl|node|ruby))'; then
                continue
              fi

              case "$file" in
                *.sh|*.bash|bin/*|tests/*)
                  printf '%s\0' "$file" >>"$files"
                  ;;
                *)
                  if head -n 1 -- "$file" 2>/dev/null | grep -Eq '^#!.*(bash|dash|/sh|[[:space:]]sh)([[:space:]]|$)'; then
                    printf '%s\0' "$file" >>"$files"
                  fi
                  ;;
              esac
            done
          }

          if [[ $scope == "all" ]]; then
            git ls-files -z | collect_from_git_stream
          elif [[ $GITHUB_EVENT_NAME == "pull_request" ]]; then
            git diff --name-only --diff-filter=ACM -z \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}" \
              | collect_from_git_stream
          elif [[ $GITHUB_EVENT_NAME == "push" ]]; then
            before="${{ github.event.before }}"

            if [[ -z $before || $before == "0000000000000000000000000000000000000000" ]]; then
              git ls-files -z | collect_from_git_stream
            else
              git diff --name-only --diff-filter=ACM -z \
                "$before" \
                "${{ github.sha }}" \
                | collect_from_git_stream
            fi
          else
            git diff --name-only --diff-filter=ACM -z HEAD~1 HEAD | collect_from_git_stream
          fi

          if [[ ! -s $files ]]; then
            echo "has_files=false" >>"$GITHUB_OUTPUT"
            echo "No shell files to lint."
            exit 0
          fi

          sort -zu "$files" > shellcheck-files.txt
          echo "has_files=true" >>"$GITHUB_OUTPUT"
          echo "Files selected for ShellCheck:"
          tr '\0' '\n' < shellcheck-files.txt

      - name: Run ShellCheck
        if: steps.files.outputs.has_files == 'true'
        shell: bash
        run: |
          set -euo pipefail
          xargs -0 shellcheck -x -s bash --severity=warning < shellcheck-files.txt
