name: "Publish [ryoku] repo"

# Publishes the signed [ryoku] pacman repo to https://repo.ryoku.dev/stable/x86_64/.
# Triggers on a push to main (the user update channel), on a release tag
# (git push tag v*), and on manual dispatch. The Stable Release workflow also
# dispatches it, because a tag pushed by GITHUB_TOKEN does not fire the tag
# trigger. A push to unstable-dev never publishes; main only advances when the
# maintainer fast-forwards it, so each advance rebuilds the repo with a new
# commit-versioned package set that `ryoku update` (pacman -Syu) upgrades to.
# The publish is gated on the container-install smoke test below: the repo is
# signed and uploaded only after ryoku-desktop builds, installs, and materializes
# a complete config on Arch and CachyOS, so a broken build fails the publish
# instead of becoming a user-visible update.
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

# one publish at a time, never cancelled mid-flight: two interleaved uploads
# can leave run A's packages under run B's db, exactly the skew the
# packages-first-db-last ordering below exists to prevent.
concurrency:
  group: publish-repo
  cancel-in-progress: false

jobs:
  # gate: build the packages, install ryoku-desktop, and materialize a full
  # config on Arch and CachyOS before anything is signed or uploaded. an
  # unresolved dependency, or a config file no package ships, fails here, so a
  # broken build never becomes a user-visible update (the Hub sees the repo the
  # moment its db lands). mirrors the install-test container tier.
  container-install:
    name: "container install (${{ matrix.base }})"
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        base: [arch, cachyos]
    container:
      image: ${{ matrix.base == 'cachyos' && 'cachyos/cachyos:latest' || 'archlinux:latest' }}
    steps:
      - name: Install git
        run: pacman -Sy --noconfirm --needed git
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Build, install, and verify the config
        run: installation/tests/container-install.sh ${{ matrix.base }}

  publish:
    # only publish after the container-install gate passes on every base.
    needs: container-install
    runs-on: ubuntu-latest
    timeout-minutes: 120
    # makepkg, repo-add, and pacman only exist on Arch, so the whole build runs
    # inside the official Arch image. Steps run as root; the actual makepkg work
    # is dropped to an unprivileged user below.
    container:
      image: archlinux:latest
    steps:
      - name: Verify required secrets are present
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=()
          [[ -z "$R2_ACCESS_KEY_ID" ]]     && missing+=("R2_ACCESS_KEY_ID")
          [[ -z "$R2_SECRET_ACCESS_KEY" ]] && missing+=("R2_SECRET_ACCESS_KEY")
          [[ -z "$R2_ENDPOINT" ]]          && missing+=("R2_ENDPOINT")
          [[ -z "$R2_BUCKET" ]]            && missing+=("R2_BUCKET")
          [[ -z "$GPG_PRIVATE_KEY" ]]      && missing+=("GPG_PRIVATE_KEY")
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Install build toolchain
        run: |
          set -euo pipefail
          # base-devel: makepkg + fakeroot + a C++20 gcc. go/cmake/ninja and the
          # qt6 modules compile the Ryoku binaries and the Ryoku.Blobs QML plugin
          # (Qt6 Quick/ShaderTools/Multimedia; Blobs plays video, so qt6-multimedia
          # + ffmpeg). hyprland (+ pango/cairo/pixman/libdrm/libinput/libxkbcommon/
          # wayland/wayland-protocols) plus hyprcursor/pkgconf build the compositor
          # plugin packages (hypr-dynamic-cursors, ryoku-hypr-plugins, hyprglass,
          # imgborders); makepkg runs --nodeps, so their makedepends must be present
          # here. rust (cargo) builds wallust and awww from source (awww's
          # common/build.rs probes liblz4, hence lz4). gnupg signs, rclone
          # uploads, git backs checkout.
          pacman -Syu --noconfirm --needed \
            base-devel git go rust cmake ninja gnupg rclone \
            qt6-base qt6-declarative qt6-shadertools qt6-multimedia \
            hyprland hyprcursor pango cairo pixman libdrm libinput libxkbcommon wayland wayland-protocols ffmpeg pkgconf lz4

      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          # Full history so build-repo.sh can derive the commit-count package
          # version (bin/ryoku-release-version --pkgver) from `git rev-list`.
          fetch-depth: 0

      - name: Snapshot the published package set
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          # one rclone config for this job (the upload and verify steps reuse it).
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [Ryoku]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_ACCESS_KEY_ID}
          secret_access_key = ${R2_SECRET_ACCESS_KEY}
          endpoint = ${R2_ENDPOINT}
          # The scoped R2 token has Object Read+Write only, not bucket-level
          # perms; without this rclone calls HeadBucket/CreateBucket and 403s.
          # The bucket already exists, so skip the check (matches build-iso.yml).
          no_check_bucket = true
          EOF
          # build-repo.sh adopts these bytes for any filename it rebuilds, so
          # a live name keeps its live bytes. read from the bucket, not the
          # public domain: Cloudflare 403s datacenter runners.
          rclone copy "Ryoku:$R2_BUCKET/x86_64/" "$GITHUB_WORKSPACE/.published-mirror/" --include '*.pkg.tar.zst'

      - name: Verify hard dependencies exist in the official repos or [ryoku]
        run: |
          set -euo pipefail
          # build-repo.sh builds with --nodeps, so a typo'd or AUR-only entry in
          # a depends array publishes cleanly and then bricks every user's next
          # pacman -Syu with an unresolvable target. One -Si per dependency
          # here turns that into a failed publish instead.
          # bash reads the array the same way makepkg does; hand-parsing the
          # file trips over single-line arrays and comments.
          # internal deps resolve inside [ryoku] itself, so they are exempt from
          # the -Si check; the exempt list is derived from the PKGBUILDs rather
          # than hand-kept, so a typo'd internal name (say ryoku-cursor) is
          # caught here instead of skipped into a broken publish.
          internal=$(for p in release/packages/*/PKGBUILD; do
            bash -c 'source "$1" >/dev/null 2>&1; printf "%s\n" "${pkgname[@]}"' _ "$p"
          done)
          missing=0
          for p in release/packages/*/PKGBUILD; do
            mapfile -t deps < <(bash -c 'source "$1" >/dev/null 2>&1; printf "%s\n" "${depends[@]:-}"' _ "$p")
            for d in "${deps[@]}"; do
              d="${d%%[<>=]*}"
              [[ -z $d ]] && continue
              grep -qxF "$d" <<<"$internal" && continue
              if ! pacman -Si "$d" >/dev/null 2>&1; then
                echo "::error::$p: dependency '$d' not found in the official repos or [ryoku]"
                missing=1
              fi
            done
          done
          exit "$missing"

      - name: Build and sign the [ryoku] repo
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          # makepkg refuses to run as root, so build as a throwaway user that
          # owns the checked-out tree.
          useradd --create-home builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

          # Hand the release private key to the build user through a 0600 file in
          # RUNNER_TEMP; it never lands in $HOME or persistent storage. Same shape
          # as build-iso.yml: import into an ephemeral GNUPGHOME, sign, discard.
          key_file="$RUNNER_TEMP/ryoku-release-key.asc"
          printf '%s\n' "$GPG_PRIVATE_KEY" > "$key_file"
          chown builder:builder "$key_file"
          chmod 600 "$key_file"

          runuser -u builder -- env \
            KEY_FILE="$key_file" \
            RYOKU_REPO_OUT="$GITHUB_WORKSPACE/release/repo/out" \
            RYOKU_REPO_MIRROR="$GITHUB_WORKSPACE/.published-mirror" \
            bash -euo pipefail -c '
              export GNUPGHOME="$(mktemp -d)"
              chmod 700 "$GNUPGHOME"
              # The release key is passphraseless; allow loopback so gpg never
              # blocks on a pinentry that a headless runner cannot answer.
              printf "allow-loopback-pinentry\n" > "$GNUPGHOME/gpg-agent.conf"
              printf "pinentry-mode loopback\n"   > "$GNUPGHOME/gpg.conf"
              gpg --batch --import "$KEY_FILE"
              ./release/repo/build-repo.sh
            '

          rm -f "$key_file"

      - name: Upload [ryoku] repo to Cloudflare R2
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          # rclone config written by the snapshot step above.

          # Build output publishes into <bucket>/x86_64/ (served at
          # repo.ryoku.dev/stable/x86_64/). Order matters (issue #21): if ryoku.db
          # goes live before the packages and .sig files it lists, SigLevel=Required
          # installs fail with "Maximum file size exceeded", because a missing .sig
          # returns an HTML 404 that overruns pacman's signature size cap. So push
          # packages and sigs first, the db last, then prune superseded versions.
          dest="$R2_BUCKET"
          src="$GITHUB_WORKSPACE/release/repo/out/x86_64"
          remote="Ryoku:$dest/x86_64/"
          rclone copy "$src" "$remote" --exclude 'ryoku.db*' --exclude 'ryoku.files*' -P
          rclone copy "$src" "$remote" --include 'ryoku.db*' --include 'ryoku.files*' -P
          rclone sync "$src" "$remote" -P
          echo "::notice::Published [ryoku] repo to $remote (packages first, db last, stale pruned)"

      - name: Verify the published repo against the bucket
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          # every file the served db lists must exist at the recorded size
          # with its .sig, or the publish fails here instead of failing user
          # installs (issue #21). the bucket is checked, not the public
          # domain: Cloudflare 403s datacenter runners there.
          remote="Ryoku:$R2_BUCKET/x86_64"
          tmp=$(mktemp -d)
          rclone cat "$remote/ryoku.db" > "$tmp/db"
          mkdir "$tmp/x"
          bsdtar -xf "$tmp/db" -C "$tmp/x"
          rclone lsl "$remote/" > "$tmp/ls"
          bad=0
          for d in "$tmp"/x/*/desc; do
            fn=$(awk '/%FILENAME%/{getline; print; exit}' "$d")
            cs=$(awk '/%CSIZE%/{getline; print; exit}' "$d")
            got=$(awk -v f="$fn" '$NF==f{print $1; exit}' "$tmp/ls")
            if [[ "$got" != "$cs" ]]; then
              echo "::error::$fn: db records $cs bytes, bucket holds ${got:-nothing}"
              bad=1
            fi
            if ! awk -v f="$fn.sig" '$NF==f{found=1} END{exit !found}' "$tmp/ls"; then
              echo "::error::$fn.sig missing from the bucket"
              bad=1
            fi
          done
          exit "$bad"
