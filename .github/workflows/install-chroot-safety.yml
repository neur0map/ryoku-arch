name: Install chroot safety

# blocks the "fresh install halts in the chroot" class: a bare
# `systemctl --user enable|start|...` in a chroot-run install phase fails (no
# user bus) and stops the install before login/ (SDDM + qylock) and
# post-install/ run. guard each such call with `|| true`.
# see tests/install-chroot-safety.sh.

on:
  pull_request:
    paths:
      - 'installation/backend/**'
      - 'tests/install-chroot-safety.sh'
  push:
    branches:
      - main
    paths:
      - 'installation/backend/**'
      - 'tests/install-chroot-safety.sh'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  chroot-safety:
    name: Chroot-run install phases stay chroot-safe
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check user-service enables are chroot-guarded
        shell: bash
        run: bash tests/install-chroot-safety.sh
