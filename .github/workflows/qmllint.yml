name: QML Lint

# advisory only. the Ryoku surfaces import the Quickshell QML modules, which
# aren't installable on a stock CI runner, so qmllint can't resolve them and
# would flag environmental import errors as failures. this runs qmllint for
# visibility but never blocks: read its output as a hint, then verify QML on
# a running system via ryoku/shell/dev-run.sh. vendored qylock QML is exempt.

on:
  pull_request:
    paths:
      - '**/*.qml'
      - '**/qmldir'
      - '.github/workflows/qmllint.yml'
  push:
    branches:
      - main
    paths:
      - '**/*.qml'
      - '**/qmldir'
      - '.github/workflows/qmllint.yml'
  workflow_dispatch:
    inputs:
      scope:
        description: Files to lint
        required: true
        default: changed
        type: choice
        options:
          - changed
          - all

permissions:
  contents: read

jobs:
  qmllint:
    name: qmllint (advisory)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Qt QML tooling
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y qt6-declarative-dev
          qmllint_bin="/usr/lib/qt6/bin/qmllint"
          [[ -x $qmllint_bin ]] || qmllint_bin="$(command -v qmllint || true)"
          [[ -n $qmllint_bin ]] || { echo "::warning::qmllint not found; skipping."; exit 0; }
          echo "QMLLINT_BIN=$qmllint_bin" >> "$GITHUB_ENV"

      - name: Collect QML files
        id: files
        shell: bash
        run: |
          set -euo pipefail
          files="$(mktemp)"
          scope="${{ github.event.inputs.scope || 'changed' }}"

          collect() {
            while IFS= read -r -d '' f; do
              [[ -f $f ]] || continue
              case "$f" in
                ryoku/lockscreen/qylock/*) ;;   # vendored upstream, exempt
                *.qml) printf '%s\0' "$f" >>"$files" ;;
              esac
            done
          }

          if [[ $scope == all || $GITHUB_EVENT_NAME == push ]]; then
            git ls-files -z '*.qml' | collect
          elif [[ $GITHUB_EVENT_NAME == pull_request ]]; then
            git diff --name-only --diff-filter=ACM -z \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}" | collect
          else
            git ls-files -z '*.qml' | collect
          fi

          if [[ ! -s $files ]]; then
            echo "has_files=false" >>"$GITHUB_OUTPUT"
            echo "No QML files to lint."
            exit 0
          fi
          sort -zu "$files" > qmllint-files.txt
          echo "has_files=true" >>"$GITHUB_OUTPUT"

      - name: Run qmllint (non-blocking)
        if: steps.files.outputs.has_files == 'true' && env.QMLLINT_BIN != ''
        shell: bash
        run: |
          set -uo pipefail
          while IFS= read -r -d '' f; do
            echo "::group::qmllint $f"
            "$QMLLINT_BIN" "$f" || true
            echo "::endgroup::"
          done < qmllint-files.txt
          echo "qmllint is advisory; import-resolution warnings for Quickshell modules are expected."
